name: docs-context-reference-benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    if: github.repository == 'timianmalloo/ai-forward' && github.ref == 'refs/heads/main'
    environment: docs-context-reference
    runs-on: [self-hosted, Windows, X64, ai-forward-reference-benchmark, ephemeral]
    timeout-minutes: 30
    steps:
      - name: Enforce dedicated ephemeral runner
        shell: pwsh
        run: |
          if ($env:AIF_EPHEMERAL_RUNNER -ne "1") {
            throw "Reference benchmark requires a dedicated ephemeral runner."
          }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11.9"

      - name: Run pinned reference benchmark
        shell: pwsh
        run: |
          pwsh tests\docs_explorer\benchmark_docs_context.ps1 `
            -Python python `
            -OutputPath docs\proof\docs-context-benchmark.reference.json
          $result = Get-Content docs\proof\docs-context-benchmark.reference.json -Raw |
            ConvertFrom-Json
          if (-not $result.referenceBudgetProved) {
            throw "Runner does not match the pinned Azure reference environment or missed the budget."
          }

      - name: Upload reference evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-context-benchmark-reference
          path: docs/proof/docs-context-benchmark.reference.json
          if-no-files-found: error

      - name: Publish evidence handoff
        if: always()
        shell: pwsh
        run: |
          @"
          ## Reference benchmark evidence

          Download the `docs-context-benchmark-reference` artifact, place the JSON at
          `docs/proof/docs-context-benchmark.reference.json`, commit it, and rerun
          `python tools/check-consistency.py`. Revision 17 remains unreleased until that
          committed evidence passes or a human-approved deviation is recorded. The
          `docs-context-reference` environment must require human approval, and the runner
          must be a dedicated one-job ephemeral runner labeled `ephemeral` with
          `AIF_EPHEMERAL_RUNNER=1`.
          "@ | Add-Content -Path $env:GITHUB_STEP_SUMMARY
