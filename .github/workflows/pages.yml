# Publishes the self-contained pack explainer (web/) to GitHub Pages so it is reachable
# from any repo that installs the pack — /addpacktorepo links to the hosted URL.
# One-time setup: repo Settings > Pages > Build and deployment > Source = "GitHub Actions".
name: pages
on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "web"
      - id: deployment
        uses: actions/deploy-pages@v4
