<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>__PROJECT__ — Documentation</title>
<!--
  Self-contained documentation viewer for the /document bundle.
  HOW IT IS FILLED: the Documentation Steward replaces window.DOCS (below) with the bundle's
  pages — each page is { id, title, group, markdown }. Mermaid code fences in the markdown are
  rendered as diagrams. The file opens directly via file:// (no server, no build) because all
  content is embedded; Mermaid + the markdown renderer load from CDN (needs internet on first
  load — vendor them locally for fully offline use). A React single-file variant can replace
  this scaffold for teams that prefer it; this zero-build HTML is the default.
-->
<style>
  :root{
    --bg:#0f1115; --panel:#161922; --ink:#e8eaf0; --muted:#9aa3b2; --line:#262b36;
    --accent:#6ea8fe; --code-bg:#11141b; --sidebar:300px;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#ffffff; --panel:#f6f7f9; --ink:#1b1f27; --muted:#5b6573; --line:#e6e8ec;
           --accent:#2563eb; --code-bg:#f3f4f6; }
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink);
       font:15px/1.65 ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  a{color:var(--accent); text-decoration:none} a:hover{text-decoration:underline}
  .layout{display:grid; grid-template-columns:var(--sidebar) 1fr; min-height:100vh}
  nav{background:var(--panel); border-right:1px solid var(--line); padding:20px 14px;
      position:sticky; top:0; height:100vh; overflow:auto}
  nav h1{font-size:14px; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin:0 8px 14px}
  nav .group{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:16px 8px 6px}
  nav a{display:block; padding:6px 8px; border-radius:7px; color:var(--ink); font-size:14px}
  nav a:hover{background:rgba(127,127,127,.12); text-decoration:none}
  nav a.active{background:var(--accent); color:#fff}
  main{padding:40px 48px; max-width:920px; overflow:auto}
  .content h1{font-size:28px; margin:.2em 0 .6em; line-height:1.2}
  .content h2{font-size:21px; margin:1.6em 0 .5em; border-bottom:1px solid var(--line); padding-bottom:.3em}
  .content h3{font-size:16px; margin:1.4em 0 .3em; font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .content code{background:var(--code-bg); padding:.12em .4em; border-radius:5px;
                font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:.92em}
  .content pre{background:var(--code-bg); border:1px solid var(--line); border-radius:10px;
               padding:14px 16px; overflow:auto}
  .content pre code{background:none; padding:0}
  .content table{border-collapse:collapse; width:100%; margin:1em 0}
  .content th,.content td{border:1px solid var(--line); padding:8px 10px; text-align:left}
  .content blockquote{border-left:3px solid var(--accent); margin:1em 0; padding:.2em 1em; color:var(--muted)}
  .mermaid{background:transparent; margin:1.2em 0; text-align:center}
  .crumb{color:var(--muted); font-size:13px; margin-bottom:8px}
  footer{color:var(--muted); font-size:12px; margin-top:48px; border-top:1px solid var(--line); padding-top:14px}
</style>
</head>
<body>
<div class="layout">
  <nav id="nav"><h1>__PROJECT__ docs</h1></nav>
  <main><div class="crumb" id="crumb"></div><div class="content" id="content"></div>
    <footer id="footer"></footer></main>
</div>

<script>
/* ============================================================================
 * window.DOCS — REPLACED BY /document. Each entry: { id, title, group, markdown }.
 * The examples below show the shape; the skill overwrites this array wholesale.
 * ==========================================================================*/
window.DOCS = [
  { id:"index", title:"Overview", group:"Start here",
    markdown:"# __PROJECT__\n\nGenerated by `/document`. Coverage and confidence are in `docs/_meta.json`.\n\n> Replace this array with the real bundle pages.\n" },
  { id:"architecture", title:"Architecture", group:"Start here",
    markdown:"# Architecture\n\n```mermaid\nflowchart TB\n  subgraph T1[Deterministic core]\n    Service\n  end\n  subgraph T2[Cognition tier]\n    Planner\n  end\n  Planner --> Service\n```\n" },
  { id:"api-example", title:"module-a", group:"API reference",
    markdown:"# module-a\n\n### `Service.handle(x)`\nHandle a request.\n\n**Parameters** — `x` (`Request`): the input.\n**Returns** — `Result`.\n" },
  { id:"seq-example", title:"main flow", group:"Diagrams",
    markdown:"# Sequence — main flow\n\n```mermaid\nsequenceDiagram\n  actor User\n  User->>API: request(x)\n  API->>Service: handle(x)\n  Service-->>API: result\n  API-->>User: response\n```\n" }
];
window.DOC_META = { project:"__PROJECT__", generated:"", documented_sha:"" };
</script>

<script type="module">
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
const markedUrl = "https://cdn.jsdelivr.net/npm/marked/marked.min.js";

function loadMarked(){
  return new Promise((res,rej)=>{ const s=document.createElement("script");
    s.src=markedUrl; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
}
const isDark = matchMedia("(prefers-color-scheme: dark)").matches;
mermaid.initialize({ startOnLoad:false, theme: isDark ? "dark" : "default", securityLevel:"loose" });

const docs = window.DOCS || [];
const byId = Object.fromEntries(docs.map(d=>[d.id,d]));

function buildNav(){
  const nav = document.getElementById("nav");
  const groups = {};
  docs.forEach(d=>{ (groups[d.group||"Pages"] ||= []).push(d); });
  for(const g of Object.keys(groups)){
    const h=document.createElement("div"); h.className="group"; h.textContent=g; nav.appendChild(h);
    groups[g].forEach(d=>{ const a=document.createElement("a"); a.textContent=d.title;
      a.href="#"+d.id; a.dataset.id=d.id; nav.appendChild(a); });
  }
}
async function render(id){
  const d = byId[id] || docs[0]; if(!d) return;
  document.getElementById("crumb").textContent = (d.group? d.group+" / ":"")+d.title;
  document.getElementById("content").innerHTML = window.marked.parse(d.markdown||"");
  // convert ```mermaid code blocks into rendered diagrams
  document.querySelectorAll("code.language-mermaid").forEach((c,i)=>{
    const div=document.createElement("div"); div.className="mermaid"; div.textContent=c.textContent;
    c.closest("pre").replaceWith(div);
  });
  try{ await mermaid.run({ querySelector:".mermaid" }); }catch(e){ console.warn("mermaid:",e); }
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("active", a.dataset.id===d.id));
  const m=window.DOC_META||{}; document.getElementById("footer").textContent =
    `Generated ${m.generated||"—"} · documented commit ${(m.documented_sha||"—").slice(0,7)}`;
}
addEventListener("hashchange",()=>render(location.hash.slice(1)));
(async()=>{ await loadMarked(); buildNav(); render(location.hash.slice(1) || (docs[0]&&docs[0].id)); })();
</script>
</body>
</html>
