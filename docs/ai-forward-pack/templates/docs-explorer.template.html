<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Docs Explorer</title>
  <style>
    :root {
      color-scheme: light dark;
      --color-bg: #0f1115;
      --color-surface: #161922;
      --color-surface-raised: #161922;
      --color-border: #687386;
      --color-text: #e8eaf0;
      --color-text-muted: #9aa3b2;
      --color-primary: #6ea8fe;
      --color-on-primary: #000000;
      --color-focus: #8ab4ff;
      --color-warning: #f2a65a;
      --color-error: #f28b82;
      --color-success: #7bd88f;
      --color-info: #6ea8fe;
      --color-graph-path: #8ab4ff;
      --color-graph-ghost: #687386;
      --color-graph-node-muted: #9aa3b2;
      --space-1: 2px;
      --space-2: 4px;
      --space-3: 8px;
      --space-4: 12px;
      --space-5: 16px;
      --space-6: 24px;
      --space-7: 32px;
      --space-8: 48px;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --target-min: 44px;
      --focus-width: 3px;
      --border-width: 1px;
      --focus-offset: 2px;
      --skip-offset: -5rem;
      --brand-min: 14rem;
      --title-size: 1.25rem;
      --search-min: 12rem;
      --search-max: 24rem;
      --notice-border-width: 0.25rem;
      --viewport-header-offset: 9rem;
      --label-size: 0.75rem;
      --label-tracking: 0.08em;
      --selection-inset: 4px;
      --search-outline-width: 2px;
      --search-outline-offset: -4px;
      --meta-size: 0.8125rem;
      --visual-min-height: 32rem;
      --graph-label-size: 12px;
      --edge-width: 1.5;
      --edge-path-width: 3;
      --node-width: 9rem;
      --context-ring-width: 2px;
      --badge-min-height: 1.75rem;
      --pill-radius: 999px;
      --source-max-height: 28rem;
      --sr-size: 1px;
      --sr-offset: -1px;
      --narrow-panel-offset: 11rem;
      --narrow-visual-min-height: 24rem;
      --motion-fast: 120ms;
      --font-body: "Segoe UI", Aptos, Calibri, sans-serif;
      --font-mono: Consolas, "Courier New", Courier, monospace;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --color-bg: #ffffff;
        --color-surface: #f6f7f9;
        --color-surface-raised: #f6f7f9;
        --color-border: #6b7280;
        --color-text: #1b1f27;
        --color-text-muted: #5b6573;
        --color-primary: #2563eb;
        --color-on-primary: #ffffff;
        --color-focus: #005fcc;
        --color-warning: #8a4b08;
        --color-error: #b3261e;
        --color-success: #146c2e;
        --color-info: #2563eb;
        --color-graph-path: #005fcc;
        --color-graph-ghost: #6b7280;
        --color-graph-node-muted: #5b6573;
      }
    }
    @media (prefers-contrast: more) {
      :root {
        --color-bg: #000000;
        --color-surface: #000000;
        --color-surface-raised: #000000;
        --color-border: #ffffff;
        --color-text: #ffffff;
        --color-text-muted: #ffffff;
        --color-primary: #ffff00;
        --color-on-primary: #000000;
        --color-focus: #ffff00;
        --color-warning: #ffff00;
        --color-error: #ff8080;
        --color-success: #00ff00;
        --color-info: #ffff00;
        --color-graph-path: #ffff00;
        --color-graph-ghost: #ffffff;
        --color-graph-node-muted: #ffffff;
      }
    }
    * { box-sizing: border-box; }
    html { background: var(--color-bg); color: var(--color-text); font-family: var(--font-body); }
    body { margin: 0; min-width: 20rem; }
    button, input, select, a, summary { font: inherit; }
    button, .button {
      min-height: var(--target-min);
      max-width: 100%;
      min-width: 0;
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-surface-raised);
      color: var(--color-text);
      padding: var(--space-2) var(--space-3);
      overflow-wrap: anywhere;
      cursor: pointer;
    }
    button:hover, .button:hover { border-color: var(--color-primary); }
    button:disabled { cursor: not-allowed; color: var(--color-text-muted); }
    :focus-visible {
      outline: var(--focus-width) solid var(--color-focus);
      outline-offset: var(--focus-offset);
    }
    a { color: var(--color-primary); }
    a[href], summary {
      min-height: var(--target-min);
      display: inline-flex;
      align-items: center;
    }
    .skip-link {
      position: fixed; left: var(--space-2); top: var(--skip-offset); z-index: 20;
      background: var(--color-surface); padding: var(--space-3);
    }
    .skip-link:focus { top: var(--space-2); }
    .app-header {
      display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap;
      padding: var(--space-4) var(--space-6);
      border-bottom: var(--border-width) solid var(--color-border);
      background: var(--color-surface);
    }
    .brand { min-width: var(--brand-min); flex: 1; }
    .brand h1 { margin: 0; font-size: var(--title-size); }
    .brand p { margin: var(--space-1) 0 0; color: var(--color-text-muted); }
    .search {
      display: grid; grid-template-columns: minmax(var(--search-min), var(--search-max)) auto auto;
      gap: var(--space-2); align-items: center;
    }
    .search input {
      min-height: var(--target-min); width: 100%; padding: var(--space-2) var(--space-3);
      border: var(--border-width) solid var(--color-border); border-radius: var(--radius-sm);
      background: var(--color-bg); color: var(--color-text);
    }
    .tabs { display: flex; gap: var(--space-2); padding: var(--space-3) var(--space-6); overflow-x: auto; }
    .projection-choice[aria-selected="true"] {
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-color: var(--color-primary);
      border-bottom-width: calc(var(--border-width) * 4);
    }
    .projection-choice[aria-selected="true"]::after {
      content: " \2713";
      font-weight: 800;
    }
    .notice, .health {
      margin: 0 var(--space-6) var(--space-3); padding: var(--space-3);
      border-left: var(--notice-border-width) solid var(--color-warning); background: var(--color-surface);
    }
    .shell {
      display: grid; grid-template-columns: minmax(0, 0.8fr) minmax(0, 1.7fr) minmax(0, 0.9fr);
      min-height: calc(100vh - var(--viewport-header-offset));
    }
    .panel { min-width: 0; padding: var(--space-4); border-right: var(--border-width) solid var(--color-border); }
    .panel:last-child { border-right: 0; }
    .panel h2, .panel h3 { margin-top: 0; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; gap: var(--space-2); }
    .route-back { display: none; }
    .narrow-selection-actions { display: none; }
    .narrow-selection-action { display: none; }
    .filters {
      display: grid; gap: var(--space-2); padding: var(--space-3);
      border: var(--border-width) solid var(--color-border); border-radius: var(--radius-md);
      background: var(--color-surface);
    }
    .filter-group { min-width: 0; margin: 0; padding: 0; border: 0; }
    .filter-group legend { padding: 0; font-weight: 700; }
    .filter-options { display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .filter-options label {
      display: inline-flex; align-items: center; gap: var(--space-1);
      min-width: var(--target-min); min-height: var(--target-min);
    }
    .tree-group { margin-top: var(--space-4); }
    .tree-group h3 {
      color: var(--color-text-muted); font-size: var(--label-size); letter-spacing: var(--label-tracking);
      text-transform: uppercase; margin-bottom: var(--space-2);
    }
    [role="tree"], [role="group"] { display: grid; gap: var(--space-1); }
    [role="group"] { padding-left: var(--space-4); }
    [role="treeitem"] { width: 100%; text-align: left; display: grid; gap: var(--space-1); }
    [role="treeitem"][data-kind="group"] { font-weight: 700; color: var(--color-text-muted); }
    [role="treeitem"][aria-selected="true"], [data-selected="true"] {
      border-color: var(--color-primary); box-shadow: inset var(--selection-inset) 0 var(--color-primary);
    }
    [data-search-match="true"] { outline: var(--search-outline-width) dashed var(--color-warning); outline-offset: var(--search-outline-offset); }
    .match-indicator { font-size: var(--label-size); font-weight: 700; color: var(--color-warning); }
    .meta { color: var(--color-text-muted); font-size: var(--meta-size); }
    .projection-toolbar, .detail-actions {
      display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-3);
    }
    .current-title { flex-basis: 100%; margin: 0; overflow-wrap: anywhere; }
    .visualization {
      min-height: var(--visual-min-height); border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-md); overflow: auto; background: var(--color-bg);
    }
    .visualization svg { display: block; min-width: 100%; }
    .lane-label { fill: var(--color-text-muted); font: 700 var(--graph-label-size) var(--font-body); text-transform: uppercase; }
    .edge { stroke: var(--color-border); stroke-width: var(--edge-width); fill: none; marker-end: url(#arrow); }
    .edge.path { stroke: var(--color-graph-path); stroke-width: var(--edge-path-width); }
    .edge.ghost, .edge.unrelated { stroke: var(--color-graph-ghost); stroke-dasharray: 5 5; }
    .edge-label {
      fill: var(--color-text); font: 700 var(--label-size) var(--font-body);
      paint-order: stroke; stroke: var(--color-bg); stroke-width: 4px; pointer-events: none;
    }
    .node-control {
      width: var(--node-width); min-height: var(--target-min); overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis; text-align: left;
    }
    .node-control:focus {
      outline: var(--focus-width) solid var(--color-focus);
      outline-offset: var(--focus-offset);
    }
    .node-control.context {
      border-color: var(--color-warning);
      box-shadow: inset 0 0 0 var(--context-ring-width) var(--color-warning);
    }
    .context-indicator { font-weight: 700; }
    .health-marker {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 1.25em; margin-right: var(--space-1); border: var(--border-width) solid currentColor;
      border-radius: var(--pill-radius); font-weight: 800;
    }
    .node-control.depth-2, .node-control.unrelated { color: var(--color-graph-node-muted); }
    .node-control.unrelated { border-style: dashed; }
    .node-control .visual-label[aria-hidden="true"] { color: var(--color-graph-node-muted); }
    .relationship-list { margin-top: var(--space-4); }
    .relationship-list ul { list-style: none; padding: 0; display: grid; gap: var(--space-2); }
    .relationship-list li { padding: var(--space-2); border: var(--border-width) solid var(--color-border); border-radius: var(--radius-sm); }
    .relationship-list li.path { border-color: var(--color-graph-path); }
    .relationship-list button { width: 100%; text-align: left; }
    .details-card { display: grid; grid-template-columns: minmax(0, 1fr); gap: var(--space-3); }
    .summary { line-height: 1.55; }
    .badge {
      display: inline-flex; align-items: center; min-height: var(--badge-min-height); padding: 0 var(--space-2);
      border: var(--border-width) solid var(--color-border); border-radius: var(--pill-radius); font-size: var(--label-size);
    }
    .badge.stale, .badge.review-suggested { border-color: var(--color-warning); }
    pre {
      max-height: var(--source-max-height); overflow: auto; white-space: pre-wrap; overflow-wrap: anywhere;
      background: var(--color-bg); border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-sm); padding: var(--space-3); font-family: var(--font-mono);
    }
    .empty { color: var(--color-text-muted); padding: var(--space-6); text-align: center; }
    .sr-only {
      position: absolute; width: var(--sr-size); height: var(--sr-size); padding: 0; margin: var(--sr-offset);
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    [hidden] { display: none !important; }
    @media (prefers-reduced-motion: no-preference) {
      button { transition: border-color var(--motion-fast), background-color var(--motion-fast); }
    }
    @media (forced-colors: active) {
      :root {
        --color-bg: Canvas;
        --color-surface: Canvas;
        --color-surface-raised: Canvas;
        --color-border: ButtonText;
        --color-text: CanvasText;
        --color-text-muted: CanvasText;
        --color-primary: Highlight;
        --color-on-primary: HighlightText;
        --color-focus: Highlight;
        --color-warning: Mark;
        --color-graph-path: Highlight;
        --color-graph-ghost: GrayText;
        --color-graph-node-muted: GrayText;
      }
      .edge { forced-color-adjust: auto; }
      [data-search-match="true"],
      [data-search-match="true"]:focus,
      [data-search-match="true"]:focus-visible { outline-style: double; }
      .node-control.context {
        border-color: Mark;
        border-style: double;
        border-width: 3px;
      }
      .projection-choice[aria-selected="true"],
      [role="treeitem"][aria-selected="true"],
      [data-selected="true"] {
        outline: 3px double ButtonText;
        outline-offset: 2px;
      }
    }
    @media (max-width: 720px) {
      .app-header { padding: var(--space-3); }
      .search { grid-template-columns: minmax(0, 1fr) auto auto; width: 100%; min-width: 0; }
      .search input { min-width: 0; }
      .tabs, .notice, .health { margin-left: 0; margin-right: 0; padding-left: var(--space-3); padding-right: var(--space-3); }
      .shell { display: block; min-height: 0; }
      .panel { display: none; border: 0; min-height: calc(100vh - var(--narrow-panel-offset)); padding: var(--space-3); }
      body[data-route="browse"] .browse-panel,
      body[data-route="visualization"] .visual-panel,
      body[data-route="details"] .details-panel { display: block; }
      .route-back { display: inline-flex; }
      .narrow-selection-actions {
        display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-2);
        margin-bottom: var(--space-3);
      }
      .narrow-selection-action { display: inline-flex; }
      .narrow-selection-actions .meta { flex-basis: 100%; margin: 0; }
      .visualization { min-height: var(--narrow-visual-min-height); }
    }
  </style>
</head>
<body data-route="browse">
  <a class="skip-link" href="#main">Skip to project map</a>
  <div id="app">
    <header class="app-header">
      <div class="brand"><h1>Docs Explorer</h1><p>Loading project map...</p></div>
    </header>
    <main id="main"><section class="notice">Loading the local project index...</section></main>
  </div>
  <div id="explorer-status" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
  <script>
    window.__docsExplorerLoadFailed = function (code) {
      clearTimeout(window.__docsExplorerLoadTimer);
      document.getElementById("app").innerHTML =
        '<header class="app-header"><div class="brand"><h1>Docs Explorer</h1><p>Local project map</p></div></header>' +
        '<main id="main"><section role="alert" class="notice"><strong>' + code +
        '</strong> The project map could not be loaded. Check the local Explorer assets and retry. ' +
        '<button type="button" onclick="location.reload()">Retry loading</button></section></main>';
    };
    window.__docsExplorerLoadTimer = setTimeout(function () {
      window.__docsExplorerLoadFailed("DOC.INDEX.UNAVAILABLE");
    }, 5000);
  </script>
  <script src="./docs-index.js" onerror="window.__docsExplorerLoadFailed('DOC.INDEX.UNAVAILABLE')"></script>
  <script src="./ai-forward-pack/scripts/docs-explorer-core.js" onerror="window.__docsExplorerLoadFailed('DOC.INDEX.UNAVAILABLE')"></script>
  <script>
    (function () {
      "use strict";
      clearTimeout(window.__docsExplorerLoadTimer);
      const app = document.getElementById("app");
      const statusRegion = document.getElementById("explorer-status");
      const index = window.DOCS_INDEX;
      const core = window.DocsExplorerCore;
      if (!index || !core) {
        window.__docsExplorerLoadFailed("DOC.INDEX.UNAVAILABLE");
        return;
      }

      const SOURCE_DEADLINE_MS = 5000;
      const SOURCE_MAX_BYTES = 1024 * 1024;
      const narrow = () => matchMedia("(max-width: 720px)").matches;
      let state = core.decodeUrlState(new URLSearchParams(location.hash.slice(1)), index, { narrow: narrow() });
      let activeMatchIndex = 0;
      let sourceState = { artifactId: null, status: "idle", text: "" };
      let sourceRequestSequence = 0;
      let sourceAbortController = null;
      let searchComposing = false;
      let searchRenderFrame = null;
      let appHistoryDepth = Number(history.state?.docsExplorerDepth || 0);
      let spatialZoomTier = "overview";
      const indexBytes = new TextEncoder().encode(JSON.stringify(index)).length;
      const relationshipCount = (index.artifacts || []).reduce(
        (total, artifact) => total + (artifact.links || []).length,
        0,
      );

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, (character) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        }[character]));
      }
      function artifactById(id) { return index.artifacts.find((artifact) => artifact.id === id); }
      function hrefFor(artifact) {
        const path = String(artifact.path || "").replace(/\\/g, "/");
        if (!path.startsWith("docs/") || path.split("/").includes("..")) {
          throw new Error("source path is outside the approved docs root");
        }
        const base = new URL("./", document.baseURI);
        const target = new URL(path.slice("docs/".length), base);
        if (target.origin !== base.origin || !target.pathname.startsWith(base.pathname)) {
          throw new Error("source origin is not approved");
        }
        return target.href;
      }
      function safeHrefFor(artifact) {
        try { return hrefFor(artifact); }
        catch (_) { return null; }
      }
      async function sourceSha256(text) {
        if (!crypto.subtle) throw new Error("source verification unavailable");
        const normalized = String(text).replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(normalized));
        return [...new Uint8Array(digest)]
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      }
      function focusKey() {
        const active = document.activeElement;
        return active?.dataset?.focusKey || active?.id || null;
      }
      function policy(name) { return index.traversalPolicies?.[name] || []; }
      function contextFor(model, rootId) {
        return core.neighborhood(model, rootId, 2, policy("explore-neighborhood"));
      }
      async function boundedResponseText(response, maximumBytes) {
        const declared = Number(response.headers.get("content-length") || 0);
        if (declared > maximumBytes) throw new Error("source over limit");
        if (!response.body?.getReader) {
          const bytes = new Uint8Array(await response.arrayBuffer());
          if (bytes.byteLength > maximumBytes) throw new Error("source over limit");
          return new TextDecoder().decode(bytes);
        }
        const reader = response.body.getReader();
        const chunks = [];
        let total = 0;
        try {
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            total += value.byteLength;
            if (total > maximumBytes) {
              await reader.cancel("source over limit");
              throw new Error("source over limit");
            }
            chunks.push(value);
          }
        } finally {
          reader.releaseLock();
        }
        const bytes = new Uint8Array(total);
        let offset = 0;
        for (const chunk of chunks) {
          bytes.set(chunk, offset);
          offset += chunk.byteLength;
        }
        return new TextDecoder().decode(bytes);
      }
      function indexLimitFailure() {
        if (indexBytes > (index.limits?.indexBytes ?? 5 * 1024 * 1024)) return "indexBytes";
        if (index.artifacts.length > (index.limits?.artifacts ?? 1000)) return "artifacts";
        if (relationshipCount > (index.limits?.relationships ?? 5000)) return "relationships";
        return null;
      }
      function announce(message) {
        if (!message) return;
        statusRegion.textContent = "";
        requestAnimationFrame(() => { statusRegion.textContent = message; });
      }
      function cancelSourceRequest() {
        sourceRequestSequence += 1;
        sourceAbortController?.abort();
        sourceAbortController = null;
        sourceState = { artifactId: null, status: "idle", text: "" };
      }
      function recoveryShell(code, message) {
        app.innerHTML = `<header class="app-header"><div class="brand"><h1>Docs Explorer</h1>
          <p>Local project map</p></div></header>
          <main id="main"><section role="alert" class="notice"><strong>${esc(code)}</strong>
            ${esc(message)} <button type="button" onclick="location.reload()">Retry loading</button>
          </section></main>`;
      }
      function announcementFor(event, model) {
        if (event.type === "SELECT_NODE") {
          return `Selected ${artifactById(event.id)?.title || event.id}.`;
        }
        if (event.type === "EXPLORE_CONTEXT") {
          const context = contextFor(model, event.id);
          const direct = [...context.depth.values()].filter((depth) => depth === 1).length;
          const second = [...context.depth.values()].filter((depth) => depth === 2).length;
          return `Explored ${artifactById(event.id)?.title || event.id}: ${direct} direct and ${second} two-hop neighbors.`;
        }
        if (event.type === "LEAVE_CONTEXT") return "Left neighborhood context.";
        return state.notice;
      }
      function commit(event, options = {}) {
        const returnFocusKey = options.focusKey ?? focusKey();
        if (options.history !== false && options.history !== "replace") {
          history.replaceState({
            ...(history.state || {}),
            focusKey: returnFocusKey,
            docsExplorerDepth: appHistoryDepth,
          }, "", location.href);
        }
        state = core.reduceState(state, event, index, { narrow: narrow() });
        const encoded = core.encodeUrlState(state);
        const destination = encoded ? "#" + encoded : location.pathname;
        if (options.history === "replace") {
          history.replaceState({ docsExplorerDepth: appHistoryDepth }, "", destination);
        } else if (options.history !== false) {
          appHistoryDepth += 1;
          history.pushState({ docsExplorerDepth: appHistoryDepth }, "", destination);
        }
        const model = core.normalizeProjection(index, state.filters);
        render({
          focusKey: options.nextFocusKey ?? returnFocusKey,
          focusHeading: options.focusHeading,
          announcement: announcementFor(event, model),
          restoreFallback: options.restoreFallback,
        });
      }
      function focusRestoredState() {
        let target = null;
        if (state.route === "browse" && state.selectedNodeId) {
          target = app.querySelector(`[role="treeitem"][data-id="${CSS.escape(state.selectedNodeId)}"]`);
        } else if (state.route === "visualization" && state.selectedNodeId) {
          target = app.querySelector(`[data-node-id="${CSS.escape(state.selectedNodeId)}"]`);
        } else if (state.route === "details") {
          target = document.getElementById("details-heading");
        }
        (target || app.querySelector('.projection-choice[aria-selected="true"]'))?.focus();
      }
      function scheduleSearchRender(selection) {
        if (searchRenderFrame !== null) cancelAnimationFrame(searchRenderFrame);
        searchRenderFrame = requestAnimationFrame(() => {
          searchRenderFrame = null;
          render({ searchSelection: selection, announceSearch: true });
        });
      }
      function restore(event) {
        appHistoryDepth = Number(event?.state?.docsExplorerDepth || 0);
        const decoded = core.decodeUrlState(
          new URLSearchParams(location.hash.slice(1)),
          index,
          { narrow: narrow() },
        );
        state = core.reduceState(
          state,
          { type: "RESTORE_STATE", state: decoded },
          index,
          { narrow: narrow() },
        );
        render({ focusKey: event?.state?.focusKey, restoreFallback: true });
      }
      window.addEventListener("popstate", restore);
      window.addEventListener("resize", () => {
        const priorFocus = focusKey();
        state = core.normalizeState(state, index, narrow());
        render({ focusKey: priorFocus });
      });

      function healthSummary(model) {
        const stale = model.nodes.filter((node) => node.health.includes("stale")).length;
        const flagged = model.nodes.filter((node) => node.health.includes("review-suggested")).length;
        if (!stale && !flagged) return "";
        return `<div class="health">Some context is stale or incomplete. Review graph health before using it. ` +
          `<span class="meta">${stale} stale, ${flagged} review suggested.</span></div>`;
      }

      function tabs() {
        return `<div class="tabs" role="tablist" aria-label="Explorer projection">
          ${["browse","graph","mindmap"].map((projection) => {
            const label = projection === "mindmap" ? "Mind map" : projection[0].toUpperCase() + projection.slice(1);
            const selected = state.projection === projection;
            return `<button class="projection-choice" id="projection-${projection}" role="tab"
              data-focus-key="tab-${projection}" data-action="projection" data-value="${projection}"
              aria-selected="${selected}" aria-controls="main" tabindex="${selected ? "0" : "-1"}">${label}</button>`;
          }).join("")}
        </div>`;
      }

      function filterPanel(model) {
        const types = [...new Set(index.artifacts.map((artifact) => artifact.type))].sort();
        return `<form class="filters" id="filters-form">
          <strong>Filters</strong>
          <fieldset class="filter-group"><legend>Type</legend>
            <div class="filter-options">${types.map((type) =>
              `<label><input type="checkbox" name="type" value="${esc(type)}" ${state.filters.types.includes(type) ? "checked" : ""}>${esc(type)}</label>`
            ).join("")}</div>
          </fieldset>
          <fieldset class="filter-group"><legend>Health</legend>
            <div class="filter-options">
              <label><input type="checkbox" name="health" value="stale" ${state.filters.health.includes("stale") ? "checked" : ""}>Stale</label>
              <label><input type="checkbox" name="health" value="review-suggested" ${state.filters.health.includes("review-suggested") ? "checked" : ""}>Review suggested</label>
            </div>
          </fieldset>
          <div class="filter-options">
            <button type="submit" data-focus-key="apply-filters">Apply filters</button>
            <button type="button" data-action="clear-filters" data-focus-key="clear-filters">Clear filters</button>
            <span class="meta">${model.nodes.length} visible artifacts</span>
          </div>
        </form>`;
      }

      function browse(model, matches) {
        const groups = new Map();
        for (const node of model.nodes) {
          if (!groups.has(node.type)) groups.set(node.type, []);
          groups.get(node.type).push(node);
        }
        if (!model.nodes.length) return '<div class="empty">No artifacts match these filters. Clear filters</div>';
        const entries = [...groups.entries()];
        const treeSelectionVisible = model.nodes.some((node) => node.id === state.selectedNodeId);
        return `<div role="tree" aria-label="Project artifacts">${entries.map(([type, nodes], groupIndex) => `
          <button role="treeitem" data-kind="group" data-group-id="${esc(type)}"
            data-focus-key="tree-group-${esc(type)}" aria-expanded="true" aria-level="1"
            aria-posinset="${groupIndex + 1}" aria-setsize="${entries.length}"
            tabindex="${!treeSelectionVisible && groupIndex === 0 ? "0" : "-1"}">
            ${esc(type)} <span class="meta">${nodes.length} artifacts</span>
          </button>
          <div role="group" data-group="${esc(type)}">
            ${nodes.map((node, nodeIndex) => {
              const match = matches.includes(node.id);
              return `<button role="treeitem" data-kind="artifact" data-parent-group="${esc(type)}"
                data-action="select" data-id="${esc(node.id)}" data-focus-key="tree-${esc(node.id)}"
                aria-selected="${state.selectedNodeId === node.id}" data-search-match="${match}"
                aria-level="2" aria-posinset="${nodeIndex + 1}" aria-setsize="${nodes.length}"
                tabindex="${state.selectedNodeId === node.id ? "0" : "-1"}">
                <span>${esc(node.title)}</span>
                ${match ? '<span class="match-indicator">Search match</span>' : ""}
                <span class="meta">${esc(node.status)} · ${esc(node.id)}</span>
              </button>`;
            }).join("")}
          </div>`).join("")}</div>`;
      }

      function pathEdgeIds(model) {
        if (state.pathMode === "none" || !state.selectedNodeId) return new Set();
        return new Set(
          core.policyPaths(model, state.selectedNodeId, policy(state.pathMode), 2)
            .map((path) => path.edgeId),
        );
      }

      function graphViewBox(layout, context) {
        if (!context || !context.ids.size) return `0 0 ${layout.width} ${layout.height}`;
        const focusNodes = layout.nodes.filter((node) => (context.depth.get(node.id) ?? 99) <= 1);
        if (!focusNodes.length) return `0 0 ${layout.width} ${layout.height}`;
        const xs = focusNodes.map((node) => node.x);
        const ys = focusNodes.map((node) => node.y);
        const left = Math.max(0, Math.min(...xs) - 130);
        const top = Math.max(0, Math.min(...ys) - 90);
        const width = Math.max(320, Math.max(...xs) - Math.min(...xs) + 260);
        const height = Math.max(240, Math.max(...ys) - Math.min(...ys) + 180);
        return `${left} ${top} ${width} ${height}`;
      }

      function graphNodeViewBox(layout, nodeId) {
        const node = layout.nodes.find((candidate) => candidate.id === nodeId);
        if (!node) return graphViewBox(layout, null);
        const width = Math.min(layout.width, 360);
        const height = Math.min(layout.height, 280);
        const left = Math.max(0, Math.min(layout.width - width, node.x - width / 2));
        const top = Math.max(0, Math.min(layout.height - height, node.y - height / 2));
        return `${left} ${top} ${width} ${height}`;
      }

      function spatialLayout(model, mindMap) {
        const nodeLimit = index.limits?.spatialNodes ?? 500;
        const edgeLimit = index.limits?.spatialEdges ?? 1000;
        if (model.nodes.length > nodeLimit || model.edges.length > edgeLimit) return null;
        const dimensions = core.layoutDimensions(model.nodes.length);
        const rootId = core.mindMapRoot(state, index);
        return mindMap
          ? core.radialLayout(model, rootId, dimensions.width, dimensions.height, policy("explore-neighborhood"))
          : core.deterministicLayout(model, dimensions.width, dimensions.height);
      }

      function graphView(model, matches, mindMap, layout) {
        if (!layout) {
          const nodeLimit = index.limits?.spatialNodes ?? 500;
          const edgeLimit = index.limits?.spatialEdges ?? 1000;
          return `<div role="alert" class="empty"><strong>DOC.INDEX.LIMIT_EXCEEDED</strong>
            This graph exceeds the spatial view limit (${nodeLimit} nodes / ${edgeLimit} edges).
            Browse and relationship lists remain available.</div>`;
        }
        const width = layout.width;
        const height = layout.height;
        const fullViewBox = graphViewBox(layout, null);
        const positions = new Map(layout.nodes.map((node) => [node.id, node]));
        const pathIds = pathEdgeIds(model);
        const context = state.contextNodeId ? contextFor(model, state.contextNodeId) : null;
        const labelLimit = index.limits?.visibleLabels ?? 150;
        const pathNodeIds = new Set();
        for (const edge of model.edges) {
          if (!pathIds.has(edge.id)) continue;
          pathNodeIds.add(edge.source);
          pathNodeIds.add(edge.target);
        }
        const prioritized = [...layout.nodes].sort((left, right) => {
          const score = (node) => {
            if (node.id === state.selectedNodeId) return 0;
            if (node.id === state.contextNodeId) return 1;
            if (matches.includes(node.id)) return 2;
            const depth = context?.depth.get(node.id);
            if (depth === 1) return 3;
            if (node.health?.some((item) => item !== "healthy")) return 4;
            if (depth === 2) return 5;
            if (context) return 9;
            return 6;
          };
          return score(left) - score(right) || left.id.localeCompare(right.id);
        });
        const labelCandidates = prioritized.filter((node) => {
          if (node.id === state.selectedNodeId || node.id === state.contextNodeId) return true;
          if (spatialZoomTier === "overview") {
            return node.health?.some((item) => item !== "healthy");
          }
          if (spatialZoomTier === "neighborhood") {
            const depth = context?.depth.get(node.id);
            return depth === 1 || pathNodeIds.has(node.id);
          }
          return true;
        });
        const labelIds = new Set(
          labelCandidates.slice(0, labelLimit).map((node) => node.id),
        );
        if (!layout.nodes.length) return '<div class="empty">No artifacts match these filters. Clear filters</div>';
        const edgeSvg = layout.edges.map((edge) => {
          const source = positions.get(edge.source), target = positions.get(edge.target);
          if (!source || !target) return "";
          const unrelated = context && (!context.ids.has(edge.source) || !context.ids.has(edge.target));
          const classes = ["edge", pathIds.has(edge.id) ? "path" : "",
            layout.ghostEdgeIds?.has(edge.id) ? "ghost" : "", unrelated ? "unrelated" : ""]
            .filter(Boolean).join(" ");
          const label = spatialZoomTier === "detail"
            ? `<text class="edge-label" x="${(source.x + target.x) / 2}" y="${(source.y + target.y) / 2 - 6}">${esc(edge.rel)}</text>`
            : "";
          return `<g><line id="edge-${esc(edge.id)}" class="${classes}" x1="${source.x}" y1="${source.y}" x2="${target.x}" y2="${target.y}">
            <title>${esc(edge.source)} ${esc(edge.rel)} ${esc(edge.target)}</title></line>${label}</g>`;
        }).join("");
        const laneSvg = mindMap ? "" : layout.lanes.map((lane) =>
          `<text class="lane-label" x="${lane.x + 12}" y="24">${esc(lane.id)} · ${
            layout.nodes.filter((node) =>
              node.lane === lane.id && node.health?.some((item) => item !== "healthy")
            ).length
          } review</text>`
        ).join("");
        const rovingId = layout.nodes.some((node) => node.id === state.selectedNodeId)
          ? state.selectedNodeId
          : layout.nodes.some((node) => node.id === state.contextNodeId)
            ? state.contextNodeId
            : layout.nodes[0]?.id;
        const nodeSvg = layout.nodes.map((node, indexInLayout) => {
          const relationshipCount = model.edges.filter((edge) => edge.source === node.id || edge.target === node.id).length;
          const selected = state.selectedNodeId === node.id;
          const isContext = state.contextNodeId === node.id;
          const depth = context?.depth.get(node.id);
          const contextClass = !context ? "" : isContext ? "context" :
            depth === 1 ? "depth-1" : depth === 2 ? "depth-2" : "unrelated";
          const match = matches.includes(node.id);
          const labelVisible = labelIds.has(node.id);
          const health = (node.health || []).filter((item) => item !== "healthy");
          const accessibleName = `${node.title}, ${node.type}, ${node.status}, ${relationshipCount} relationships${health.length ? `, health ${health.join(", ")}` : ""}${match ? ", search match" : ""}`;
          return `<foreignObject x="${node.x - 72}" y="${node.y - 24}" width="144" height="64">
            <button xmlns="http://www.w3.org/1999/xhtml" class="node-control ${contextClass}"
              data-node-id="${esc(node.id)}" data-action="select" data-id="${esc(node.id)}"
              data-focus-key="node-${esc(node.id)}" data-selected="${selected}" data-search-match="${match}"
              aria-pressed="${selected}" tabindex="${node.id === rovingId ? "0" : "-1"}"
              aria-label="${esc(accessibleName)}" title="${esc(node.title)}">
              ${isContext ? '<span class="context-indicator" aria-hidden="true">◆ </span>' : ""}
              ${spatialZoomTier === "detail" && health.length ? '<span class="health-marker" aria-hidden="true">!</span>' : ""}
              ${labelVisible ? `<span class="visual-label">${esc(node.title)}</span>` :
                `<span class="visual-label" aria-hidden="true">•</span><span class="sr-only">${esc(node.title)}</span>`}
              ${match ? '<span class="match-indicator">Match</span>' : ""}
            </button></foreignObject>`;
        }).join("");
        const fitViewBox = graphViewBox(layout, mindMap ? null : context);
        const detailViewBox = graphNodeViewBox(
          layout,
          state.selectedNodeId || state.contextNodeId || layout.nodes[0]?.id,
        );
        const initialViewBox = spatialZoomTier === "detail"
          ? detailViewBox
          : spatialZoomTier === "neighborhood"
            ? fitViewBox
            : fullViewBox;
        return `<div class="visualization" role="region" aria-label="${mindMap ? "Project mind map" : "Project graph"}">
          <svg data-graph-svg data-zoom-tier="${spatialZoomTier}" data-full-viewbox="${esc(fullViewBox)}"
            data-fit-viewbox="${esc(fitViewBox)}" data-detail-viewbox="${esc(detailViewBox)}"
            viewBox="${esc(initialViewBox)}" width="${width}" height="${height}" aria-hidden="false">
            <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker></defs>
            ${laneSvg}${edgeSvg}${nodeSvg}
          </svg>
        </div>`;
      }

      function relationshipList(model, layout, artifactId = null) {
        const byId = new Map(model.nodes.map((node) => [node.id, node]));
        const visibleEdges = layout?.edges || model.edges;
        const edges = artifactId
          ? visibleEdges.filter((edge) => edge.source === artifactId || edge.target === artifactId)
          : visibleEdges;
        const pathIds = pathEdgeIds(model);
        const heading = artifactId ? "Relationships" : `Visible relationships (${edges.length})`;
        return `<section class="relationship-list"><h3>${heading}</h3>
          ${edges.length ? `<ul>${edges.map((edge) => `<li id="list-${esc(edge.id)}" class="${pathIds.has(edge.id) ? "path" : ""}">
            <button data-action="select" data-id="${esc(edge.source)}"
              data-focus-key="relationship-${esc(artifactId || "visible")}-${esc(edge.id)}-source">${esc(byId.get(edge.source)?.title || edge.source)}</button>
            <strong>${esc(edge.rel)}</strong>
            <button data-action="select" data-id="${esc(edge.target)}"
              data-focus-key="relationship-${esc(artifactId || "visible")}-${esc(edge.id)}-target">${esc(byId.get(edge.target)?.title || edge.target)}</button>
            ${pathIds.has(edge.id) ? '<span class="meta">On traced path</span>' : ""}
          </li>`).join("")}</ul>` : '<p class="empty">No visible relationships.</p>'}
        </section>`;
      }

      function details(model) {
        const artifact = artifactById(state.selectedNodeId);
        if (!artifact) return `<div class="empty">
          <h2 id="details-heading" tabindex="-1">Artifact details</h2>
          <p>Select an artifact to inspect its context.</p>
          <button disabled aria-describedby="explore-disabled-reason">Explore neighborhood</button>
          <p id="explore-disabled-reason" class="meta">Select an artifact before exploring its neighborhood.</p>
        </div>`;
        const health = core.artifactHealth(artifact);
        const outside = !model.nodes.some((node) => node.id === artifact.id);
        const source = sourceState.artifactId === artifact.id ? sourceState : { status: "idle", text: "" };
        const sourceHref = safeHrefFor(artifact);
        const pathCount = pathEdgeIds(model).size;
        return `<article class="details-card">
          <div><span class="badge">${esc(artifact.type)}</span> <span class="badge">${esc(artifact.status)}</span>
            ${health.map((item) => `<span class="badge ${esc(item)}">${esc(item)}</span>`).join(" ")}</div>
          <h2 id="details-heading" tabindex="-1">${esc(artifact.title)}</h2>
          ${outside ? '<p class="notice">This selection is outside the active filters.</p>' : ""}
          <p class="summary">${esc(artifact.summary || "No summary available.")}</p>
          <dl><dt>Artifact ID</dt><dd><code>${esc(artifact.id)}</code></dd>
            <dt>Owner</dt><dd>${esc(artifact.owner || "Unassigned")}</dd>
            <dt>Review by</dt><dd>${esc(artifact.reviewBy || "Frozen record")}</dd></dl>
          <div class="detail-actions">
            <button data-action="explore" data-focus-key="explore-${esc(artifact.id)}"
              ${outside ? 'disabled aria-describedby="outside-filter-reason"' : ""}>Explore neighborhood</button>
            <button data-action="route" data-value="details" data-focus-key="open-details">Open details</button>
            <button data-action="path" data-value="grounding" data-focus-key="path-grounding"
              aria-pressed="${state.pathMode === "grounding"}">Trace grounding</button>
            <button data-action="path" data-value="impact" data-focus-key="path-impact"
              aria-pressed="${state.pathMode === "impact"}">Trace impact</button>
            <button data-action="path" data-value="proof" data-focus-key="path-proof"
              aria-pressed="${state.pathMode === "proof"}">Show proofs</button>
            ${sourceHref
              ? `<a class="button" href="${esc(sourceHref)}">Open source file</a>`
              : '<span class="button" aria-disabled="true">Source path unavailable</span>'}
          </div>
          ${state.pathMode !== "none"
            ? `<p>${pathCount
                ? `${pathCount} relationship${pathCount === 1 ? "" : "s"} highlighted for the ${esc(state.pathMode)} trace.`
                : `No ${esc(state.pathMode)} relationships are available from this artifact.`}</p>`
            : ""}
          ${outside ? '<p id="outside-filter-reason" class="meta">Clear the excluding filters before exploring this artifact.</p>' : ""}
          ${state.contextNodeId ? '<button data-action="leave-context" data-focus-key="leave-context-details">Leave neighborhood</button>' : ""}
          ${relationshipList(model, null, artifact.id)}
          <section><h3>Source and diagrams</h3>
            <button data-action="load-source" data-focus-key="load-source" ${source.status === "loading" ? "disabled" : ""}>
              ${source.status === "loading" ? "Loading source..." : source.status === "error" ? "Retry source body" : source.status === "ready" ? "Reload source body" : "Load source body"}
            </button>
            ${source.status === "loading" ? "<p>Loading source...</p>" : ""}
            ${source.status === "error" ? '<p role="alert"><strong>DOC.DOCUMENT.UNAVAILABLE</strong> The source body is unavailable; metadata and links remain usable.</p>' : ""}
            ${source.status === "ready" ? `<pre>${esc(source.text)}</pre>` : ""}
            ${(artifact.diagrams || []).map((diagram) => `<details><summary>${esc(diagram.title)}</summary><pre>${esc(diagram.mermaid)}</pre></details>`).join("")}
          </section>
        </article>`;
      }

      function restoreFocus(options) {
        if (options.searchSelection) {
          const search = document.getElementById("search");
          search?.focus();
          search?.setSelectionRange(options.searchSelection.start, options.searchSelection.end);
          return;
        }
        let target = options.focusHeading ? document.getElementById(options.focusHeading) : null;
        if (!target && options.focusKey) {
          target = app.querySelector(`[data-focus-key="${CSS.escape(options.focusKey)}"]`) ||
            document.getElementById(options.focusKey);
        }
        if (target && !target.closest("[hidden]")) target.focus();
        else if (options.restoreFallback) focusRestoredState();
      }

      function render(options = {}) {
        let model;
        try { model = core.normalizeProjection(index, state.filters); }
        catch (error) {
          recoveryShell(
            "DOC.INDEX.INVALID",
            "The project map could not be loaded. Repair the graph and regenerate the index.",
          );
          return;
        }
        if (!index.artifacts.length) {
          app.innerHTML = `<header class="app-header"><div class="brand"><h1>${esc(index.project || "Project")} Docs Explorer</h1></div></header>
            <main id="main"><section class="notice">
              <strong>No indexed artifacts yet.</strong>
              Add graph frontmatter, then run <code>docs-graph.py derive</code> to build the project map.
            </section></main>`;
          return;
        }
        const exceeded = indexLimitFailure();
        if (exceeded) {
          recoveryShell(
            "DOC.INDEX.LIMIT_EXCEEDED",
            `The project index exceeds the supported ${exceeded} limit. Use docs-graph.py context or reduce the corpus.`,
          );
          return;
        }
        const matches = core.searchMatches(model.nodes, state.search.query);
        if (activeMatchIndex >= matches.length) activeMatchIndex = 0;
        const selectedOutsideFilters = state.selectedNodeId &&
          !model.nodes.some((node) => node.id === state.selectedNodeId);
        document.body.dataset.route = state.route;
        if (state.contextNodeId) document.body.dataset.context = state.contextNodeId;
        else delete document.body.dataset.context;
        const mindMap = state.projection === "mindmap";
        let layout = null;
        let layoutError = null;
        if (state.projection !== "browse") {
          try { layout = spatialLayout(model, mindMap); }
          catch (error) { layoutError = error; }
        }
        const visual = state.projection === "browse"
          ? '<div class="empty">Choose Graph or Mind map to visualize the typed network.</div>'
          : layoutError
            ? `<div role="alert" class="notice"><strong>DOC.LAYOUT.UNAVAILABLE</strong>
                The spatial view could not be calculated. Browse and relationship lists remain available.
                <button data-action="projection" data-value="browse" data-focus-key="layout-recovery">Return to Browse</button>
              </div>`
            : graphView(model, matches, mindMap, layout);
        const selectedTitle = artifactById(state.selectedNodeId)?.title;
        const contextTitle = artifactById(state.contextNodeId)?.title;
        const projectionTitle = state.projection === "mindmap"
          ? "Mind map"
          : state.projection[0].toUpperCase() + state.projection.slice(1);
        document.title = `${selectedTitle || projectionTitle} - ${index.project || "Project"} Docs Explorer`;
        app.innerHTML = `
          <header class="app-header">
            <div class="brand"><h1>${esc(index.project)} Docs Explorer</h1>
              <p>${index.artifacts.length} artifacts · deterministic graph ${esc((index.graphSha256 || "").slice(0, 12))}</p></div>
            <div class="search">
              <label class="sr-only" for="search">Search artifacts</label>
              <input id="search" data-focus-key="search" type="search" aria-label="Search artifacts"
                value="${esc(state.search.query)}" placeholder="Find an artifact">
              <button data-action="match" data-value="previous" data-focus-key="match-previous"
                ${matches.length ? "" : "disabled"}>Previous</button>
              <button data-action="match" data-value="next" data-focus-key="match-next"
                ${matches.length ? "" : "disabled"}>Next</button>
              <span class="meta">${matches.length} matches</span>
            </div>
          </header>
          ${tabs()}${state.notice ? `<div class="notice">${esc(state.notice)}</div>` : ""}
          ${state.search.query && !matches.length ? `<div class="notice">No search results for "${esc(state.search.query)}". The graph remains unchanged.</div>` : ""}
          ${healthSummary(model)}
          <main id="main" class="shell" role="tabpanel" aria-labelledby="projection-${esc(state.projection)}">
            <section class="panel browse-panel" aria-labelledby="browse-heading">
              <div class="panel-header"><h2 id="browse-heading" tabindex="-1">Browse</h2></div>
              ${state.selectedNodeId ? `<div class="narrow-selection-actions">
                <button class="narrow-selection-action" data-action="route" data-value="details"
                  data-focus-key="open-details-narrow">Open details</button>
                <button class="narrow-selection-action" data-action="explore"
                  data-focus-key="explore-narrow-${esc(state.selectedNodeId)}"
                  ${selectedOutsideFilters ? 'disabled aria-describedby="outside-filter-reason-narrow"' : ""}>
                  Explore neighborhood
                </button>
                ${selectedOutsideFilters ? '<p id="outside-filter-reason-narrow" class="meta">Clear the excluding filters before exploring this artifact.</p>' : ""}
              </div>` : ""}
              ${filterPanel(model)}${browse(model, matches)}
            </section>
            <section class="panel visual-panel" aria-labelledby="visual-heading">
              <div class="panel-header"><button class="route-back" data-action="back" data-focus-key="back-visualization">Back</button>
                <h2 id="visual-heading" tabindex="-1">${state.projection === "mindmap" ? "Mind map" : "Graph"}</h2></div>
              <div class="projection-toolbar" role="toolbar" aria-label="Projection controls"
                tabindex="-1" data-focus-key="projection-toolbar">
                ${state.contextNodeId ? '<button data-action="leave-context" data-focus-key="leave-context-toolbar">Leave neighborhood</button>' : ""}
                ${layout ? '<button data-action="reset-view" data-focus-key="reset-view">Reset project view</button><button data-action="fit-view" data-focus-key="fit-view">Fit neighborhood</button><button data-action="detail-view" data-focus-key="detail-view">Show detail</button>' : ""}
                <span class="meta">${state.contextNodeId ? "Context: " + esc(contextTitle || state.contextNodeId) : "Project context"}</span>
                ${selectedTitle ? `<p class="current-title"><strong>Selected:</strong> ${esc(selectedTitle)}</p>` : ""}
              </div>
              ${visual}${relationshipList(model, layout)}
            </section>
            <aside class="panel details-panel" aria-labelledby="details-heading">
              <div class="panel-header"><button class="route-back" data-action="back" data-focus-key="back-details">Back</button><span></span></div>
              ${details(model)}
            </aside>
          </main>`;
        bind(model, matches, layout);
        requestAnimationFrame(() => requestAnimationFrame(() => restoreFocus(options)));
        const searchAnnouncement = options.announceSearch && matches.length === 0
          ? "0 search matches"
          : "";
        announce(options.announcement || searchAnnouncement || state.notice);
      }

      function bind(model, matches, layoutModel) {
        const search = document.getElementById("search");
        search?.addEventListener("compositionstart", () => { searchComposing = true; });
        search?.addEventListener("compositionend", (event) => {
          searchComposing = false;
          state = core.reduceState(state, { type: "SET_SEARCH", query: event.target.value }, index, { narrow: narrow() });
          scheduleSearchRender({ start: event.target.selectionStart, end: event.target.selectionEnd });
        });
        search?.addEventListener("input", (event) => {
          state = core.reduceState(state, { type: "SET_SEARCH", query: event.target.value }, index, { narrow: narrow() });
          if (searchComposing) return;
          scheduleSearchRender({ start: event.target.selectionStart, end: event.target.selectionEnd });
        });
        document.getElementById("filters-form")?.addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          commit({ type: "APPLY_FILTERS", filters: {
            types: data.getAll("type"), statuses: data.getAll("status"),
            health: data.getAll("health"), relations: data.getAll("relation"),
          }}, { nextFocusKey: "apply-filters" });
        });
        app.querySelectorAll("[data-action]").forEach((control) => control.addEventListener("click", async (event) => {
          const action = event.currentTarget.dataset.action;
          const value = event.currentTarget.dataset.value;
          const initiatorFocusKey = event.currentTarget.dataset.focusKey || focusKey();
          if (action === "projection") commit(
            { type: "SET_PROJECTION", value },
            {
              focusKey: initiatorFocusKey,
              nextFocusKey: `tab-${value}`,
              focusHeading: narrow() ? (value === "browse" ? "browse-heading" : "visual-heading") : null,
            },
          );
          if (action === "select") {
            const id = event.currentTarget.dataset.id;
            if (state.selectedNodeId !== id) cancelSourceRequest();
            commit(
              { type: "SELECT_NODE", id },
              { focusKey: initiatorFocusKey, restoreFallback: true },
            );
          }
          if (action === "explore" && state.selectedNodeId) {
            spatialZoomTier = "neighborhood";
            commit(
              { type: "EXPLORE_CONTEXT", id: state.selectedNodeId },
              { focusKey: initiatorFocusKey, focusHeading: narrow() ? "visual-heading" : null },
            );
          }
          if (action === "leave-context") {
            spatialZoomTier = "overview";
            commit(
              { type: "LEAVE_CONTEXT" },
              { focusKey: initiatorFocusKey, nextFocusKey: "projection-toolbar" },
            );
          }
          if (action === "path") commit(
            { type: "SET_PATH_MODE", value },
            {
              focusKey: initiatorFocusKey,
              nextFocusKey: `path-${value}`,
              focusHeading: narrow() ? "visual-heading" : null,
            },
          );
          if (action === "route") commit(
            { type: "SET_ROUTE", value },
            { focusKey: initiatorFocusKey, focusHeading: `${value}-heading` },
          );
          if (action === "clear-filters") commit(
            { type: "APPLY_FILTERS", filters: {} },
            { focusKey: initiatorFocusKey, nextFocusKey: "clear-filters" },
          );
          if (action === "back") {
            if (appHistoryDepth > 0) history.back();
            else commit(
              { type: "SET_PROJECTION", value: "browse" },
              { focusHeading: "browse-heading" },
            );
          }
          if (action === "match" && matches.length) {
            activeMatchIndex = (activeMatchIndex + (value === "next" ? 1 : -1) + matches.length) % matches.length;
            const id = matches[activeMatchIndex];
            commit(
              { type: "SET_ROUTE", value: "browse" },
              { nextFocusKey: `tree-${id}` },
            );
          }
          if (action === "fit-view" || action === "reset-view" || action === "detail-view") {
            spatialZoomTier = action === "detail-view"
              ? "detail"
              : action === "fit-view"
                ? "neighborhood"
                : "overview";
            render({
              focusKey: initiatorFocusKey,
              nextFocusKey: action,
              announcement: `Showing ${spatialZoomTier} graph detail`,
            });
          }
          if (action === "load-source" && state.selectedNodeId) {
            const artifact = artifactById(state.selectedNodeId);
            const requestedId = artifact.id;
            cancelSourceRequest();
            const requestSequence = ++sourceRequestSequence;
            const requestController = new AbortController();
            sourceAbortController = requestController;
            sourceState = { artifactId: requestedId, status: "loading", text: "" };
            render({
              focusKey: "load-source",
              announcement: `Loading source for ${artifact.title}`,
            });
            try {
              const text = await core.runWithDeadline(async (deadlineSignal) => {
                const abortForDeadline = () => requestController.abort(deadlineSignal.reason);
                if (deadlineSignal.aborted) abortForDeadline();
                else deadlineSignal.addEventListener("abort", abortForDeadline, { once: true });
                try {
                  const response = await fetch(hrefFor(artifact), { signal: requestController.signal });
                  if (!response.ok) throw new Error("source unavailable");
                  const body = await boundedResponseText(response, SOURCE_MAX_BYTES);
                  if (!artifact.sourceSha256 || await sourceSha256(body) !== artifact.sourceSha256) {
                    throw new Error("source verification failed");
                  }
                  return body;
                } finally {
                  deadlineSignal.removeEventListener("abort", abortForDeadline);
                }
              }, SOURCE_DEADLINE_MS);
              if (state.selectedNodeId !== requestedId || requestSequence !== sourceRequestSequence) return;
              sourceState = { artifactId: requestedId, status: "ready", text };
            } catch (_) {
              if (state.selectedNodeId !== requestedId || requestSequence !== sourceRequestSequence) return;
              sourceState = { artifactId: requestedId, status: "error", text: "" };
            } finally {
              if (sourceAbortController === requestController) sourceAbortController = null;
            }
            render({
              focusKey: "load-source",
              announcement: sourceState.status === "ready"
                ? `Source loaded for ${artifact.title}`
                : `Source unavailable for ${artifact.title}`,
            });
          }
        }));
        app.querySelectorAll('[role="treeitem"]').forEach((item) => item.addEventListener("keydown", (event) => {
          const items = [...app.querySelectorAll('[role="treeitem"]')].filter((candidate) => !candidate.closest("[hidden]"));
          const indexInList = items.indexOf(event.currentTarget);
          const group = event.currentTarget.dataset.groupId;
          const childGroup = group ? app.querySelector(`[role="group"][data-group="${CSS.escape(group)}"]`) : null;
          const moveFocus = (target) => {
            if (!target) return;
            app.querySelectorAll('[role="treeitem"]').forEach((candidate) => { candidate.tabIndex = -1; });
            target.tabIndex = 0;
            target.focus();
          };
          if (event.key === "ArrowDown") { event.preventDefault(); moveFocus(items[Math.min(indexInList + 1, items.length - 1)]); }
          if (event.key === "ArrowUp") { event.preventDefault(); moveFocus(items[Math.max(indexInList - 1, 0)]); }
          if (event.key === "Home") { event.preventDefault(); moveFocus(items[0]); }
          if (event.key === "End") { event.preventDefault(); moveFocus(items.at(-1)); }
          if (event.key === "ArrowRight" && group) {
            event.preventDefault();
            if (event.currentTarget.getAttribute("aria-expanded") === "false") {
              event.currentTarget.setAttribute("aria-expanded", "true");
              childGroup.hidden = false;
            } else moveFocus(childGroup.querySelector('[role="treeitem"]'));
          }
          if (event.key === "ArrowLeft") {
            const parentGroup = event.currentTarget.dataset.parentGroup;
            if (group && event.currentTarget.getAttribute("aria-expanded") === "true") {
              event.preventDefault();
              if (childGroup.contains(document.activeElement)) moveFocus(event.currentTarget);
              event.currentTarget.setAttribute("aria-expanded", "false");
              childGroup.hidden = true;
            } else if (parentGroup) {
              event.preventDefault();
              moveFocus(app.querySelector(`[data-group-id="${CSS.escape(parentGroup)}"]`));
            }
          }
          if ((event.key === "Enter" || event.key === " ") && group) {
            event.preventDefault();
            const expanded = event.currentTarget.getAttribute("aria-expanded") === "true";
            if (expanded && childGroup.contains(document.activeElement)) moveFocus(event.currentTarget);
            event.currentTarget.setAttribute("aria-expanded", String(!expanded));
            childGroup.hidden = expanded;
          } else if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            event.currentTarget.click();
          }
        }));
        app.querySelectorAll('[role="treeitem"][data-kind="group"]').forEach((item) =>
          item.addEventListener("click", (event) => {
            const group = event.currentTarget.dataset.groupId;
            const childGroup = app.querySelector(`[role="group"][data-group="${CSS.escape(group)}"]`);
            const expanded = event.currentTarget.getAttribute("aria-expanded") === "true";
            if (expanded) {
              app.querySelectorAll('[role="treeitem"]').forEach((candidate) => { candidate.tabIndex = -1; });
              event.currentTarget.tabIndex = 0;
            }
            event.currentTarget.setAttribute("aria-expanded", String(!expanded));
            childGroup.hidden = expanded;
          }),
        );
        app.querySelectorAll(".projection-choice").forEach((tab) => tab.addEventListener("keydown", (event) => {
          const tabs = [...app.querySelectorAll(".projection-choice")];
          const current = tabs.indexOf(event.currentTarget);
          let target = null;
          if (event.key === "ArrowRight") target = tabs[(current + 1) % tabs.length];
          if (event.key === "ArrowLeft") target = tabs[(current - 1 + tabs.length) % tabs.length];
          if (event.key === "Home") target = tabs[0];
          if (event.key === "End") target = tabs.at(-1);
          if (target) {
            event.preventDefault();
            target.click();
          }
        }));
        app.querySelectorAll("[data-node-id]").forEach((node) => node.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); event.currentTarget.click(); }
          if (event.key === "Escape") {
            event.preventDefault();
            if (state.contextNodeId) commit(
              { type: "LEAVE_CONTEXT" },
              { nextFocusKey: "projection-toolbar" },
            );
            else app.querySelector('[data-focus-key="projection-toolbar"]')?.focus();
          }
          if (event.key.startsWith("Arrow")) {
            const target = core.directionalNeighbor(layoutModel.nodes,event.currentTarget.dataset.nodeId,event.key);
            if (target) {
              event.preventDefault();
              const targetNode = app.querySelector(`[data-node-id="${CSS.escape(target)}"]`);
              app.querySelectorAll("[data-node-id]").forEach((candidate) => { candidate.tabIndex = -1; });
              if (targetNode) {
                targetNode.tabIndex = 0;
                targetNode.focus();
              }
            }
          }
        }));
      }
      history.replaceState({
        ...(history.state || {}),
        docsExplorerDepth: appHistoryDepth,
      }, "", location.href);
      render();
    })();
  </script>
</body>
</html>
