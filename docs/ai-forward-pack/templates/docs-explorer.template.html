<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Docs Explorer</title>
  <style>
    :root {
      color-scheme: light;
      --cp-bg: #f7f4ef;
      --cp-bg-elevated: #fcfbf8;
      --cp-surface: #ffffff;
      --cp-surface-soft: #f5f5f5;
      --cp-border: #dedede;
      --cp-border-strong: #8a8886;
      --cp-text: #242424;
      --cp-text-muted: #5c5c5c;
      --cp-text-soft: #6f6f6f;
      --cp-accent: #b11f4b;
      --cp-accent-hover: #9a1a41;
      --cp-accent-soft: rgba(177, 31, 75, 0.08);
      --cp-accent-fg: #ffffff;
      --cp-success: #146c2e;
      --cp-danger: #b3261e;
      --cp-warning: #8a4b08;
      --cp-link: #006cbe;
      --cp-shadow-sm: 0 6px 24px rgba(0, 0, 0, 0.08);
      --cp-shadow-md: 0 8px 28px rgba(0, 0, 0, 0.06);
      --cp-shadow-lg: 0 18px 48px rgba(0, 0, 0, 0.12);
      --cp-panel: rgba(255, 255, 255, 0.86);
      --cp-panel-strong: rgba(255, 255, 255, 0.96);
      --cp-highlight: rgba(177, 31, 75, 0.12);
      --color-bg: var(--cp-bg);
      --color-surface: var(--cp-bg-elevated);
      --color-surface-raised: var(--cp-surface);
      --color-border: var(--cp-border-strong);
      --color-text: var(--cp-text);
      --color-text-muted: var(--cp-text-muted);
      --color-primary: var(--cp-accent);
      --color-on-primary: var(--cp-accent-fg);
      --color-focus: var(--cp-link);
      --color-warning: var(--cp-warning);
      --color-error: var(--cp-danger);
      --color-success: var(--cp-success);
      --color-info: var(--cp-link);
      --color-graph-path: var(--cp-accent);
      --color-graph-ghost: var(--cp-border-strong);
      --color-graph-node-muted: var(--cp-text-soft);
      --space-1: 2px;
      --space-2: 4px;
      --space-3: 8px;
      --space-4: 12px;
      --space-5: 16px;
      --space-6: 24px;
      --space-7: 32px;
      --space-8: 48px;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --target-min: 44px;
      --focus-width: 3px;
      --border-width: 1px;
      --focus-offset: 2px;
      --skip-offset: -5rem;
      --brand-min: 14rem;
      --title-size: 1.25rem;
      --search-min: 12rem;
      --search-max: 24rem;
      --notice-border-width: 0.25rem;
      --viewport-header-offset: 9rem;
      --label-size: 0.75rem;
      --label-tracking: 0.08em;
      --selection-inset: 4px;
      --search-outline-width: 2px;
      --search-outline-offset: -4px;
      --meta-size: 0.8125rem;
      --visual-min-height: 32rem;
      --graph-label-size: 12px;
      --edge-width: 1.5;
      --edge-path-width: 3;
      --node-width: 9rem;
      --context-ring-width: 2px;
      --badge-min-height: 1.75rem;
      --pill-radius: 999px;
      --source-max-height: 28rem;
      --sr-size: 1px;
      --sr-offset: -1px;
      --narrow-panel-offset: 11rem;
      --narrow-visual-min-height: 24rem;
      --motion-fast: 120ms;
      --motion-context: 220ms;
      --skeleton-short-width: 68%;
      --font-body: "Segoe UI", Aptos, Calibri, sans-serif;
      --font-mono: Consolas, "Courier New", Courier, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --cp-bg: #3d3b3a;
        --cp-bg-elevated: #343231;
        --cp-surface: #292929;
        --cp-surface-soft: #2e2e2e;
        --cp-border: #474747;
        --cp-border-strong: #888684;
        --cp-text: #dedede;
        --cp-text-muted: #a8a8a8;
        --cp-text-soft: #b0b0b0;
        --cp-accent: #fd8ea1;
        --cp-accent-hover: #fb7b91;
        --cp-accent-soft: rgba(253, 142, 161, 0.14);
        --cp-accent-fg: #1a1a1a;
        --cp-success: #4ade80;
        --cp-danger: #ff9191;
        --cp-warning: #fbbf24;
        --cp-link: #62b0ff;
        --cp-shadow-sm: 0 6px 24px rgba(0, 0, 0, 0.22);
        --cp-shadow-md: 0 8px 28px rgba(0, 0, 0, 0.26);
        --cp-shadow-lg: 0 18px 48px rgba(0, 0, 0, 0.32);
        --cp-panel: rgba(41, 41, 41, 0.72);
        --cp-panel-strong: rgba(41, 41, 41, 0.96);
        --cp-highlight: rgba(253, 142, 161, 0.12);
      }
    }
    @media (prefers-contrast: more) {
      :root {
        --cp-bg: #000000;
        --cp-bg-elevated: #000000;
        --cp-surface: #000000;
        --cp-surface-soft: #000000;
        --cp-border: #ffffff;
        --cp-border-strong: #ffffff;
        --cp-text: #ffffff;
        --cp-text-muted: #ffffff;
        --cp-text-soft: #ffffff;
        --cp-accent: #ffff00;
        --cp-accent-hover: #ffff00;
        --cp-accent-soft: transparent;
        --cp-accent-fg: #000000;
        --cp-success: #00ff00;
        --cp-danger: #ff8080;
        --cp-warning: #ffff00;
        --cp-link: #ffff00;
        --cp-shadow-sm: none;
        --cp-shadow-md: none;
        --cp-shadow-lg: none;
        --cp-panel: #000000;
        --cp-panel-strong: #000000;
        --cp-highlight: transparent;
        --color-bg: #000000;
        --color-surface: #000000;
        --color-surface-raised: #000000;
        --color-border: #ffffff;
        --color-text: #ffffff;
        --color-text-muted: #ffffff;
        --color-primary: #ffff00;
        --color-on-primary: #000000;
        --color-focus: #ffff00;
        --color-warning: #ffff00;
        --color-error: #ff8080;
        --color-success: #00ff00;
        --color-info: #ffff00;
        --color-graph-path: #ffff00;
        --color-graph-ghost: #ffffff;
        --color-graph-node-muted: #ffffff;
      }
    }
    * { box-sizing: border-box; }
    html { background: var(--color-bg); color: var(--color-text); font-family: var(--font-body); }
    body { margin: 0; min-width: 20rem; background: var(--color-bg); }
    button, input, select, a, summary { font: inherit; }
    button, .button {
      min-height: var(--target-min);
      max-width: 100%;
      min-width: 0;
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-surface-raised);
      color: var(--color-text);
      padding: var(--space-2) var(--space-3);
      overflow-wrap: anywhere;
      cursor: pointer;
    }
    button:hover, .button:hover { border-color: var(--color-primary); }
    button:disabled { cursor: not-allowed; color: var(--color-text-muted); }
    :focus-visible {
      outline: var(--focus-width) solid var(--color-focus);
      outline-offset: var(--focus-offset);
      scroll-margin-top: var(--viewport-header-offset);
    }
    a { color: var(--color-primary); }
    a[href], summary {
      min-height: var(--target-min);
      display: inline-flex;
      align-items: center;
    }
    .skip-link {
      position: fixed; left: var(--space-2); top: var(--skip-offset); z-index: 20;
      background: var(--color-surface); padding: var(--space-3);
    }
    .skip-link:focus { top: var(--space-2); }
    .app-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap;
      padding: var(--space-4) var(--space-6);
      border-bottom: var(--border-width) solid var(--color-border);
      background: var(--cp-panel-strong);
      box-shadow: var(--cp-shadow-sm);
    }
    .brand { min-width: var(--brand-min); flex: 1; }
    .brand h1 { margin: 0; font-size: var(--title-size); }
    .brand p { margin: var(--space-1) 0 0; color: var(--color-text-muted); }
    .search {
      display: grid; grid-template-columns: minmax(var(--search-min), var(--search-max)) auto auto;
      gap: var(--space-2); align-items: center;
    }
    .search input {
      min-height: var(--target-min); width: 100%; padding: var(--space-2) var(--space-3);
      border: var(--border-width) solid var(--color-border); border-radius: var(--radius-sm);
      background: var(--color-bg); color: var(--color-text);
    }
    .tabs {
      display: flex; gap: var(--space-2); padding: var(--space-3) var(--space-6); overflow-x: auto;
      border-bottom: var(--border-width) solid var(--color-border); background: var(--cp-bg-elevated);
    }
    .projection-choice { min-width: var(--target-min); justify-content: center; }
    .projection-choice[aria-selected="true"] {
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-color: var(--color-primary);
      border-bottom-width: calc(var(--border-width) * 4);
    }
    .projection-choice[aria-selected="true"]::after {
      content: " \2713";
      font-weight: 800;
    }
    .loading-main { padding: var(--space-3); }
    .loading-panel { max-width: var(--search-max); }
    .skeleton-list { display: grid; gap: var(--space-2); }
    .skeleton-row {
      min-height: var(--target-min);
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--cp-surface-soft);
    }
    .skeleton-row:nth-child(even) { width: var(--skeleton-short-width); }
    .notice, .health {
      margin: 0 var(--space-6) var(--space-3); padding: var(--space-3);
      border-left: var(--notice-border-width) solid var(--color-warning); background: var(--color-surface);
    }
    .shell {
      display: grid; grid-template-columns: minmax(0, 0.8fr) minmax(0, 1.7fr) minmax(0, 0.9fr);
      gap: var(--space-3); min-height: calc(100vh - var(--viewport-header-offset));
      padding: var(--space-3);
    }
    .index-shell { grid-template-columns: minmax(0, 2.2fr) minmax(0, 1fr); }
    .panel {
      min-width: 0; padding: var(--space-4); border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-lg); background: var(--cp-panel); box-shadow: var(--cp-shadow-md);
    }
    .panel h2, .panel h3 { margin-top: 0; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; gap: var(--space-2); }
    .route-back { display: none; }
    .narrow-selection-actions { display: none; }
    .narrow-selection-action { display: none; }
    .filters {
      display: grid; gap: var(--space-2); padding: var(--space-3);
      border: var(--border-width) solid var(--color-border); border-radius: var(--radius-md);
      background: var(--color-surface);
    }
    .filter-group { min-width: 0; margin: 0; padding: 0; border: 0; }
    .filter-group legend { padding: 0; font-weight: 700; }
    .filter-options { display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .filter-options label {
      display: inline-flex; align-items: center; gap: var(--space-1);
      min-width: var(--target-min); min-height: var(--target-min);
    }
    .tree-group { margin-top: var(--space-4); }
    .tree-group h3 {
      color: var(--color-text-muted); font-size: var(--label-size); letter-spacing: var(--label-tracking);
      text-transform: uppercase; margin-bottom: var(--space-2);
    }
    [role="tree"], [role="group"] { display: grid; gap: var(--space-1); }
    [role="group"] { padding-left: var(--space-4); }
    [role="treeitem"] { width: 100%; text-align: left; display: grid; gap: var(--space-1); }
    [role="treeitem"][data-kind="group"] { font-weight: 700; color: var(--color-text-muted); }
    [role="treeitem"][aria-selected="true"], [data-selected="true"] {
      border-color: var(--color-primary); box-shadow: inset var(--selection-inset) 0 var(--color-primary);
    }
    [data-search-match="true"] { outline: var(--search-outline-width) dashed var(--color-warning); outline-offset: var(--search-outline-offset); }
    .match-indicator { font-size: var(--label-size); font-weight: 700; color: var(--color-warning); }
    .meta { color: var(--color-text-muted); font-size: var(--meta-size); }
    .projection-toolbar, .detail-actions {
      display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-3);
    }
    .current-title { flex-basis: 100%; margin: 0; overflow-wrap: anywhere; }
    .visualization {
      min-height: var(--visual-min-height); border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-md); overflow: auto; background: var(--cp-bg-elevated);
    }
    .visualization svg { display: block; min-width: 100%; }
    .lane-label { fill: var(--color-text-muted); font: 700 var(--graph-label-size) var(--font-body); text-transform: uppercase; }
    .edge { stroke: var(--color-border); stroke-width: var(--edge-width); fill: none; marker-end: url(#arrow); }
    .edge.path { stroke: var(--color-graph-path); stroke-width: var(--edge-path-width); }
    .edge.ghost, .edge.unrelated { stroke: var(--color-graph-ghost); stroke-dasharray: 5 5; }
    .edge-label {
      fill: var(--color-text); font: 700 var(--label-size) var(--font-body);
      paint-order: stroke; stroke: var(--color-bg); stroke-width: 4px; pointer-events: none;
    }
    .node-control {
      width: var(--node-width); min-height: var(--target-min); overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis; text-align: left;
      border-left: 4px solid var(--type-color, var(--color-border));
    }
    .node-control .type-dot { margin-right: var(--space-1); }
    .node-control:focus {
      outline: var(--focus-width) solid var(--color-focus);
      outline-offset: var(--focus-offset);
    }
    .node-control.context {
      border-color: var(--color-warning);
      box-shadow: inset 0 0 0 var(--context-ring-width) var(--color-warning);
    }
    .context-indicator { font-weight: 700; }
    .health-marker {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 1.25em; margin-right: var(--space-1); border: var(--border-width) solid currentColor;
      border-radius: var(--pill-radius); font-weight: 800;
    }
    .node-control.depth-2, .node-control.unrelated { color: var(--color-graph-node-muted); }
    .node-control.unrelated { border-style: dashed; }
    .node-control.unrelated:focus {
      box-shadow: 0 0 0 var(--focus-width) var(--color-focus);
    }
    .node-control .visual-label[aria-hidden="true"] { color: var(--color-graph-node-muted); }
    .relationship-list { margin-top: var(--space-4); }
    .relationship-list ul { list-style: none; padding: 0; display: grid; gap: var(--space-2); }
    .relationship-list li { padding: var(--space-2); border: var(--border-width) solid var(--color-border); border-radius: var(--radius-sm); }
    .relationship-list li.path { border-color: var(--color-graph-path); }
    .relationship-list button { width: 100%; text-align: left; }
    .details-card { display: grid; grid-template-columns: minmax(0, 1fr); gap: var(--space-3); }
    .summary { line-height: 1.55; }
    .badge {
      display: inline-flex; align-items: center; min-height: var(--badge-min-height); padding: 0 var(--space-2);
      border: var(--border-width) solid var(--color-border); border-radius: var(--pill-radius); font-size: var(--label-size);
    }
    .badge.stale, .badge.review-suggested { border-color: var(--color-warning); }
    pre {
      max-height: var(--source-max-height); overflow: auto; white-space: pre-wrap; overflow-wrap: anywhere;
      background: var(--color-bg); border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-sm); padding: var(--space-3); font-family: var(--font-mono);
    }
    .empty { color: var(--color-text-muted); padding: var(--space-6); text-align: center; }
    .knowledge-surfaces {
      margin: var(--space-3) var(--space-6); padding: var(--space-4);
      border: var(--border-width) solid var(--color-border); border-radius: var(--radius-lg);
      background: var(--cp-panel); box-shadow: var(--cp-shadow-md);
    }
    .knowledge-surfaces header {
      display: flex; align-items: end; justify-content: space-between; gap: var(--space-3);
      margin-bottom: var(--space-3);
    }
    .knowledge-surfaces h2, .knowledge-surfaces p { margin: 0; }
    .surface-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(13rem, 1fr)); gap: var(--space-3);
    }
    .surface-card {
      display: grid; gap: var(--space-2); align-content: start; min-height: 8rem;
      padding: var(--space-4); border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-md); background: var(--cp-surface);
    }
    .surface-card[data-kind="audit"] { border-color: var(--cp-accent); box-shadow: inset 0 3px var(--cp-accent); }
    .surface-card strong { font-size: 1rem; }
    .surface-card .surface-actions { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: auto; }
    .spatial-stage { position: relative; overflow: hidden; min-height: var(--visual-min-height); }
    .spatial-stage svg { width: 100%; height: var(--visual-min-height); min-height: var(--visual-min-height); touch-action: none; cursor: grab; }
    .spatial-stage:focus-visible { outline-offset: calc(var(--focus-offset) * -1); }
    .spatial-stage svg[data-dragging="true"] { cursor: grabbing; }
    .spatial-hint {
      position: absolute; left: var(--space-3); bottom: var(--space-3); margin: 0;
      padding: var(--space-2) var(--space-3); border: var(--border-width) solid var(--color-border);
      border-radius: var(--pill-radius); background: var(--cp-panel-strong); color: var(--color-text-muted);
      pointer-events: none;
    }
    .spatial-edge { stroke: var(--color-border); stroke-width: 1.3; opacity: 0.7; }
    .spatial-edge.path { stroke: var(--color-graph-path); stroke-width: 3; opacity: 1; }
    .spatial-edge.unrelated { stroke-dasharray: 5 5; opacity: 0.35; }
    .spatial-node-wrap { transition: opacity var(--motion-fast); }
    .sr-only {
      position: absolute; width: var(--sr-size); height: var(--sr-size); padding: 0; margin: var(--sr-offset);
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    [hidden] { display: none !important; }
    @media (prefers-reduced-motion: no-preference) {
      button, .surface-card { transition: border-color var(--motion-fast), background-color var(--motion-fast), transform var(--motion-fast); }
      .surface-card:hover { transform: translateY(-2px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .spatial-node-wrap { transition: none; }
    }
    @media (forced-colors: active) {
      :root {
        --color-bg: Canvas;
        --color-surface: Canvas;
        --color-surface-raised: Canvas;
        --color-border: ButtonText;
        --color-text: CanvasText;
        --color-text-muted: CanvasText;
        --color-primary: Highlight;
        --color-on-primary: HighlightText;
        --color-focus: Highlight;
        --color-warning: Mark;
        --color-graph-path: Highlight;
        --color-graph-ghost: GrayText;
        --color-graph-node-muted: GrayText;
      }
      .edge { forced-color-adjust: auto; }
      [data-search-match="true"],
      [data-search-match="true"]:focus,
      [data-search-match="true"]:focus-visible { outline-style: double; }
      .spatial-stage:focus,
      .spatial-stage:focus-visible {
        outline: 3px double Highlight;
        outline-offset: -3px;
      }
      .node-control.context {
        border-color: Mark;
        border-style: double;
        border-width: 3px;
      }
      .surface-card[data-kind="audit"] {
        border-style: double;
        box-shadow: none;
      }
      .projection-choice[aria-selected="true"],
      [role="treeitem"][aria-selected="true"],
      [data-selected="true"] { border-color: Highlight; }
    }
    /* ---- Colour-by-type system (shared by Index, 2D graph, 3D) ---- */
    .type-dot {
      display: inline-block; width: 0.72em; height: 0.72em; border-radius: 999px;
      background: var(--type-color, var(--color-text-muted)); vertical-align: baseline;
      border: 1px solid rgba(0,0,0,0.25); flex: none;
    }
    .legend {
      display: flex; flex-wrap: wrap; gap: var(--space-2) var(--space-4);
      padding: var(--space-3); margin-bottom: var(--space-3);
      border: var(--border-width) solid var(--color-border); border-radius: var(--radius-md);
      background: var(--color-surface);
    }
    .legend h3 { margin: 0 var(--space-3) 0 0; font-size: var(--label-size); text-transform: uppercase; letter-spacing: var(--label-tracking); color: var(--color-text-muted); }
    .legend-item { display: inline-flex; align-items: center; gap: var(--space-2); font-size: var(--meta-size); }
    /* ---- Index (searchable knowledge directory) ---- */
    .index-page { padding: var(--space-3) var(--space-6) var(--space-8); display: grid; gap: var(--space-5); }
    .index-intro { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-4); flex-wrap: wrap; }
    .index-intro h2 { margin: 0; }
    .index-intro p { margin: var(--space-1) 0 0; color: var(--color-text-muted); max-width: 46rem; }
    .catalog-toolbar { display: flex; flex-wrap: wrap; gap: var(--space-2); align-items: center; }
    .catalog-toolbar .meta { margin-left: auto; }
    .catalog-group { margin: 0; }
    .catalog-group > h3 {
      display: flex; align-items: center; gap: var(--space-2); margin: 0 0 var(--space-2);
      font-size: 0.95rem; color: var(--color-text);
    }
    .catalog-group > h3 .meta { font-weight: 400; }
    .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(17rem, 1fr)); gap: var(--space-3); }
    .catalog-card {
      display: grid; gap: var(--space-2); align-content: start; min-height: 8.5rem;
      padding: var(--space-4); border: var(--border-width) solid var(--color-border);
      border-left: 4px solid var(--type-color, var(--color-border));
      border-radius: var(--radius-md); background: var(--cp-surface); box-shadow: var(--cp-shadow-sm);
    }
    .catalog-card h4 { margin: 0; font-size: 1rem; overflow-wrap: anywhere; }
    .catalog-card .card-title-button {

  <script>
    window.__docsExplorerLoadState = "loading";

        '<main id="main"><section role="alert" class="notice"><strong>' + code +
        '</strong> The project map could not be loaded. Check the local Explorer assets and retry. ' +
        '<button type="button" onclick="location.reload()">Retry loading</button></section></main>';
    };
    window.__docsExplorerLoadTimer = setTimeout(function () {
      window.__docsExplorerLoadFailed("DOC.INDEX.UNAVAILABLE");
    }, 5000);
  </script>
  <script src="./docs-index.js" onerror="window.__docsExplorerLoadFailed('DOC.INDEX.UNAVAILABLE')"></script>
  <script src="./ai-forward-pack/scripts/docs-explorer-core.js" onerror="window.__docsExplorerLoadFailed('DOC.INDEX.UNAVAILABLE')"></script>
  <script>
    (function () {
      "use strict";
      if (window.__docsExplorerLoadState === "failed") return;
      const app = document.getElementById("app");
      const statusRegion = document.getElementById("explorer-status");
      const index = window.DOCS_INDEX;
      const core = window.DocsExplorerCore;
      if (!index || !core) {
        window.__docsExplorerLoadFailed("DOC.INDEX.UNAVAILABLE");
        return;
      }
      const SOURCE_DEADLINE_MS = 5000;
      const SOURCE_MAX_BYTES = 1024 * 1024;
      const narrow = () => matchMedia("(max-width: 720px)").matches;
      let state = core.decodeUrlState(new URLSearchParams(location.hash.slice(1)), index, { narrow: narrow() });
      let activeMatchIndex = 0;
      let sourceState = { artifactId: null, status: "idle", text: "", errorCode: "" };
      let sourceRequestSequence = 0;
      let sourceAbortController = null;
      let searchComposing = false;
      let searchRenderFrame = null;
      let focusRestoreGeneration = 0;
      let appHistoryDepth = Number(history.state?.docsExplorerDepth || 0);
      let spatialZoomTier = "overview";
      let spatialCamera = null;
      let spatialCameraFocusId = null;
      let spatialCameraTargetKey = null;
      let activeSpatialProjection = null;
      let spatialDrag = null;
      let spatialCameraFrame = null;
      let spatialCameraDestination = null;
      let spatialInputFrame = null;
      let spatialDomNodes = new Map();
      let spatialDomEdges = new Map();
      let pendingSpatialTarget = null;
      let spatialGL = null;
      let spatialGLStyle = null;
      let spatialTooltipEl = null;
      const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)");
      const forcedColors = matchMedia("(forced-colors: active)");
      const spatial3DSupported =
        typeof SVGSVGElement !== "undefined" &&
        typeof PointerEvent !== "undefined" &&
        typeof requestAnimationFrame === "function";
      const indexBytes = new TextEncoder().encode(JSON.stringify(index)).length;
      const relationshipCount = (index.artifacts || []).reduce(
        (total, artifact) => total + (artifact.links || []).length,
        0,
      );

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, (character) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        }[character]));
      }
      function artifactById(id) { return index.artifacts.find((artifact) => artifact.id === id); }
      const TYPE_PALETTE = [
        "#4f9dff", "#ff6b6b", "#ffc857", "#34d399", "#a78bfa", "#f472b6",
        "#38bdf8", "#fb923c", "#22d3ee", "#a3e635", "#e879f9", "#f59e0b",
        "#2dd4bf", "#818cf8", "#fca5a5", "#86efac",
      ];
      const typeOrder = (index.artifactTypes && index.artifactTypes.length)
        ? index.artifactTypes
        : [...new Set((index.artifacts || []).map((a) => a.type))].sort();
      function typeRankOf(type) {
        const rank = typeOrder.indexOf(type);
        if (rank >= 0) return rank;
        let hash = 0;
        for (const ch of String(type || "")) hash = (hash * 31 + ch.charCodeAt(0)) >>> 0;
        return hash;
      }
      function typeColorHex(type) { return TYPE_PALETTE[typeRankOf(type) % TYPE_PALETTE.length]; }
      function typeColorRgb(type) {
        const hex = typeColorHex(type);
        return [1, 3, 5].map((i) => parseInt(hex.slice(i, i + 2), 16) / 255);
      }
      const webglSupported = (() => {
        if (typeof document === "undefined" || typeof WebGLRenderingContext === "undefined") return false;
        try {
          const probe = document.createElement("canvas");
          const gl = probe.getContext("webgl") || probe.getContext("experimental-webgl");
          return Boolean(gl);
        } catch (_) { return false; }

      function safeDocsHref(rawPath, requiredSuffix = "") {
        const path = String(rawPath || "").replace(/\\/g, "/");
        if (!path.startsWith("docs/") || path.split("/").includes("..") ||
            (requiredSuffix && !path.endsWith(requiredSuffix))) {

        try {
          const base = new URL("./", document.baseURI);
          const target = new URL(path.slice("docs/".length), base);

        }

        const href = safeDocsHref(artifact.path);

      }
      function safeHrefFor(artifact) {
        try { return hrefFor(artifact); }
        catch (_) { return null; }
      }
      function safeSurfaceHref(surface) {
        return safeDocsHref(surface?.path, ".html");
      }
      async function sourceSha256(text) {
        if (!crypto.subtle) throw sourceFailure("DOC.SOURCE.INTEGRITY_UNAVAILABLE");
        const normalized = String(text).replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(normalized));
        return [...new Uint8Array(digest)]
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      }
      function sourceFailure(code) {
        const error = new Error(code);
        error.code = code;
        return error;
      }
      function sourceFailureCode(error) {
        if (error?.code) return error.code;
        if (error?.name === "TimeoutError") return "DOC.SOURCE.TIMEOUT";
        return "DOC.SOURCE.FETCH_FAILED";
      }
      function focusKey() {
        const active = document.activeElement;
        return active?.dataset?.focusKey || active?.id || null;
      }
      function policy(name) { return index.traversalPolicies?.[name] || []; }
      function contextFor(model, rootId) {
        return core.neighborhood(model, rootId, 2, policy("explore-neighborhood"));
      }
      async function boundedResponseText(response, maximumBytes) {
        const declared = Number(response.headers.get("content-length") || 0);
        if (declared > maximumBytes) throw sourceFailure("DOC.SOURCE.TOO_LARGE");
        if (!response.body?.getReader) {
          const bytes = new Uint8Array(await response.arrayBuffer());
          if (bytes.byteLength > maximumBytes) throw sourceFailure("DOC.SOURCE.TOO_LARGE");
          return new TextDecoder().decode(bytes);
        }
        const reader = response.body.getReader();
        const chunks = [];
        let total = 0;
        try {
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            total += value.byteLength;
            if (total > maximumBytes) {
              await reader.cancel("source over limit");
              throw sourceFailure("DOC.SOURCE.TOO_LARGE");
            }
            chunks.push(value);
          }
        } finally {
          reader.releaseLock();
        }
        const bytes = new Uint8Array(total);
        let offset = 0;
        for (const chunk of chunks) {
          bytes.set(chunk, offset);
          offset += chunk.byteLength;
        }
        return new TextDecoder().decode(bytes);
      }
      function indexLimitFailure() {
        if (indexBytes > (index.limits?.indexBytes ?? 5 * 1024 * 1024)) return "indexBytes";
        if (index.artifacts.length > (index.limits?.artifacts ?? 1000)) return "artifacts";
        if (relationshipCount > (index.limits?.relationships ?? 5000)) return "relationships";
        if ((index.surfaces || []).length > (index.limits?.surfaces ?? 100)) return "surfaces";
        return null;
      }
      function announce(message) {

        app.dataset.state = "failed";
        app.innerHTML = `<header class="app-header"><div class="brand"><h1>Docs Explorer</h1>
          <p>Local project map</p></div></header>
          <main id="main"><section role="alert" class="notice"><strong>${esc(code)}</strong>
            ${esc(message)} <button type="button" onclick="location.reload()">Retry loading</button>
          </section></main>`;
      }
      function announcementFor(event, model) {
        if (event.type === "SELECT_NODE") {
          return `Selected ${artifactById(event.id)?.title || event.id}.`;
        }
        if (event.type === "SET_SEARCH" && !event.query) return "Search cleared";
        if (event.type === "EXPLORE_CONTEXT") {
          const context = contextFor(model, event.id);
          const direct = [...context.depth.values()].filter((depth) => depth === 1).length;
