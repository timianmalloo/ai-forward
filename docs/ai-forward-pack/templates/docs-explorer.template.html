            </div>
          </fieldset>
          <div class="filter-options">
            <button type="submit" data-focus-key="apply-filters">Apply filters</button>
            <button type="button" data-action="clear-filters" data-focus-key="clear-filters">Clear filters</button>
            <span class="meta">${model.nodes.length} visible artifacts</span>
          </div>
        </form>`;
      }

      function browse(model, matches) {
        const groups = new Map();
        for (const node of model.nodes) {
          if (!groups.has(node.type)) groups.set(node.type, []);
          groups.get(node.type).push(node);
        }
        if (!model.nodes.length) return `<div class="empty">No artifacts match these filters.
          <button type="button" data-action="clear-filters" data-focus-key="clear-filters-empty">Clear filters</button>
        </div>`;
        const entries = [...groups.entries()];
        const treeSelectionVisible = model.nodes.some((node) => node.id === state.selectedNodeId);
        return `<div role="tree" aria-label="Project artifacts">${entries.map(([type, nodes], groupIndex) => `
          <button role="treeitem" data-kind="group" data-group-id="${esc(type)}"
            aria-owns="tree-group-children-${esc(type)}"
            data-focus-key="tree-group-${esc(type)}" aria-expanded="true" aria-level="1"
            aria-posinset="${groupIndex + 1}" aria-setsize="${entries.length}"
            tabindex="${!treeSelectionVisible && groupIndex === 0 ? "0" : "-1"}">
            ${esc(type)} <span class="meta">${nodes.length} artifacts</span>
          </button>
          <div id="tree-group-children-${esc(type)}" role="group" data-group="${esc(type)}">
            ${nodes.map((node, nodeIndex) => {
              const match = matches.includes(node.id);
              return `<button role="treeitem" data-kind="artifact" data-parent-group="${esc(type)}"
                data-action="select" data-id="${esc(node.id)}" data-focus-key="tree-${esc(node.id)}"
                aria-selected="${state.selectedNodeId === node.id}" data-search-match="${match}"
                aria-level="2" aria-posinset="${nodeIndex + 1}" aria-setsize="${nodes.length}"
                tabindex="${state.selectedNodeId === node.id ? "0" : "-1"}">
                <span>${esc(node.title)}</span>
                ${match ? '<span class="match-indicator">Search match</span>' : ""}
                <span class="meta">${esc(node.status)} · ${esc(node.id)}</span>
              </button>`;
            }).join("")}
          </div>`).join("")}</div>`;
      }

      function catalogCard(node, matches) {
        const color = typeColorHex(node.type);
        const match = matches.includes(node.id);
        const selected = state.selectedNodeId === node.id;
        const health = (node.health || []).filter((item) => item !== "healthy");
        const href = safeHrefFor(node);
        const relationshipCount = (node.links || []).length;
        const accessibleName = `${node.title}, ${node.type}, ${node.status}${health.length ? `, health ${health.join(", ")}` : ""}${match ? ", search match" : ""}`;
        return `<article class="catalog-card" data-artifact-card data-id="${esc(node.id)}"
            data-selected="${selected}" data-search-match="${match}" style="--type-color:${color}">
          <div class="card-badges">
            <span class="badge"><span class="type-dot"></span> ${esc(node.type)}</span>
            <span class="badge">${esc(node.status)}</span>
            ${health.map((item) => `<span class="badge ${esc(item)}">${esc(item)}</span>`).join(" ")}
            ${match ? '<span class="match-indicator">Search match</span>' : ""}
          </div>
          <button class="card-title-button" data-action="select" data-id="${esc(node.id)}"
            data-focus-key="index-${esc(node.id)}" data-selected="${selected}" data-search-match="${match}"
            aria-pressed="${selected}" aria-label="${esc(accessibleName)}">
            <span class="card-title">${esc(node.title)}</span>
          </button>
          <p class="card-summary">${esc(node.summary || "No summary available.")}</p>
          <div class="card-actions">
            ${href ? `<a class="button" href="${esc(href)}" aria-label="Open ${esc(node.title)} source file">Open</a>` : ""}
            <button data-action="locate-graph" data-id="${esc(node.id)}" data-focus-key="graph-locate-${esc(node.id)}"
              aria-label="Show ${esc(node.title)} in the graph">Graph</button>
          </div>
        </article>`;
      }

      function typeLegend(types) {
        if (!types.length) return "";
        return `<div class="legend"><h3>Types</h3>${types.map((type) =>
          `<span class="legend-item"><span class="type-dot" style="--type-color:${typeColorHex(type)}"></span>${esc(type)}</span>`
        ).join("")}</div>`;
      }

      function catalog(model, matches) {
        if (!model.nodes.length) return `<div class="empty">No artifacts match this search or these filters.
          <button type="button" data-action="clear-filters" data-focus-key="clear-filters-empty">Clear filters</button>
        </div>`;
        const groups = new Map();
        for (const node of model.nodes) {
          if (!groups.has(node.type)) groups.set(node.type, []);
          groups.get(node.type).push(node);
        }
        const usedTypes = [...groups.keys()];
        const matchNote = state.search.query.trim()
          ? `<span class="meta">${matches.length} of ${model.nodes.length} match "${esc(state.search.query.trim())}"</span>`
          : `<span class="meta">${model.nodes.length} artifacts</span>`;
        const groupsMarkup = [...groups.entries()].map(([type, nodes]) => `
          <section class="catalog-group" aria-label="${esc(type)} artifacts">
            <h3><span class="type-dot" style="--type-color:${typeColorHex(type)}"></span> ${esc(type)}
              <span class="meta">${nodes.length}</span></h3>
            <div class="catalog-grid">${nodes.map((node) => catalogCard(node, matches)).join("")}</div>
          </section>`).join("");
        return `<div class="catalog-toolbar">${matchNote}</div>${typeLegend(usedTypes)}${groupsMarkup}`;
      }

      function pathEdgeIds(model) {
        if (state.pathMode === "none" || !state.selectedNodeId) return new Set();
        return new Set(
          core.policyPaths(model, state.selectedNodeId, policy(state.pathMode), 2)
            .map((path) => path.edgeId),
        );
      }

      function graphViewBox(layout, context) {
        if (!context || !context.ids.size) return `0 0 ${layout.width} ${layout.height}`;
        const focusNodes = layout.nodes.filter((node) => (context.depth.get(node.id) ?? 99) <= 1);
        if (!focusNodes.length) return `0 0 ${layout.width} ${layout.height}`;
        const xs = focusNodes.map((node) => node.x);
        const ys = focusNodes.map((node) => node.y);
        const left = Math.max(0, Math.min(...xs) - 130);
        const top = Math.max(0, Math.min(...ys) - 90);
        const width = Math.max(320, Math.max(...xs) - Math.min(...xs) + 260);
        const height = Math.max(240, Math.max(...ys) - Math.min(...ys) + 180);
        return `${left} ${top} ${width} ${height}`;
      }

      function graphNodeViewBox(layout, nodeId) {
        const node = layout.nodes.find((candidate) => candidate.id === nodeId);
        if (!node) return graphViewBox(layout, null);
        const width = Math.min(layout.width, 360);
        const height = Math.min(layout.height, 280);
        const left = Math.max(0, Math.min(layout.width - width, node.x - width / 2));
        const top = Math.max(0, Math.min(layout.height - height, node.y - height / 2));
        return `${left} ${top} ${width} ${height}`;
      }

      function spatialLayout(model, projection) {
        const nodeLimit = index.limits?.spatialNodes ?? 500;
        const edgeLimit = index.limits?.spatialEdges ?? 1000;
        if (model.nodes.length > nodeLimit || model.edges.length > edgeLimit) return null;
        if (projection === "spatial3d") return core.deterministic3DLayout(model);
        const dimensions = core.layoutDimensions(model.nodes.length);
        const rootId = core.mindMapRoot(state, index);
        return projection === "mindmap"
          ? core.radialLayout(model, rootId, dimensions.width, dimensions.height, policy("explore-neighborhood"))
          : core.deterministicLayout(model, dimensions.width, dimensions.height);
      }

      function canonicalSpatialTarget(layout) {
        const availableSelected = layout.nodes.some((node) => node.id === state.selectedNodeId)
          ? state.selectedNodeId
          : null;
        const availableContext = layout.nodes.some((node) => node.id === state.contextNodeId)
          ? state.contextNodeId
          : null;
        const focusId = availableSelected || availableContext || "__centroid__";
        const camera = core.canonicalSpatialCamera(layout, availableSelected, availableContext);
        const targetKey = `${focusId}:${camera.target.x}:${camera.target.y}:${camera.target.z}`;
        return { availableSelected, availableContext, focusId, camera, targetKey };
      }

      function ensureSpatialCamera(layout) {
        const target = canonicalSpatialTarget(layout);
        if (!spatialCamera) {
          spatialCamera = target.camera;
          spatialCameraFocusId = target.focusId;
          spatialCameraTargetKey = target.targetKey;
        } else if (spatialCameraTargetKey !== target.targetKey) {
          spatialCameraFocusId = target.focusId;
          spatialCameraTargetKey = target.targetKey;
          if (reducedMotion.matches || forcedColors.matches) {
            spatialCamera = { ...spatialCamera, target: target.camera.target };
          } else {
            pendingSpatialTarget = target.camera.target;
          }
        }
        return spatialCamera;
      }

      function spatialProjection(layout) {
        const projected = core.projectSpatialLayout(layout, ensureSpatialCamera(layout), 1200, 760);
        activeSpatialProjection = {
          ...projected,
          nodes: projected.nodes.map((node) => ({ ...node, x: node.screenX, y: node.screenY })),
        };
        return projected;
      }

      function spatial3DView(model, matches, worldLayout, projected) {
        if (!worldLayout || !projected) return "";
        if (!projected.nodes.length) return `<div class="empty">No artifacts match these filters.
          <button type="button" data-action="clear-filters" data-focus-key="clear-filters-empty">Clear filters</button>
        </div>`;
        const pathIds = pathEdgeIds(model);
        const context = state.contextNodeId ? contextFor(model, state.contextNodeId) : null;
        spatialGLStyle = {
          colors: new Map(projected.nodes.map((node) => [node.id, typeColorRgb(node.type)])),
          selectedId: state.selectedNodeId,
          contextNodeId: state.contextNodeId,
          contextIds: context ? context.ids : null,
          depth: context ? context.depth : null,
          pathEdgeIds: pathIds,
          matchIds: new Set(matches),
        };
        const labelLimit = index.limits?.visibleLabels ?? 150;
        const labelIds = new Set(projected.nodes
          .filter((node) =>
            node.id === state.selectedNodeId ||
            node.id === state.contextNodeId ||
            matches.includes(node.id) ||
            node.health?.some((item) => item !== "healthy") ||
            (context?.depth.get(node.id) ?? 99) <= 1
          )
          .slice(-labelLimit)
          .map((node) => node.id));
        const edgeSvg = projected.edges.map((edge) => {
          const source = edge.sourcePoint;
          const target = edge.targetPoint;
          if (!source?.visible || !target?.visible) return "";
          const unrelated = context && (!context.ids.has(edge.source) || !context.ids.has(edge.target));
          const classes = ["spatial-edge", pathIds.has(edge.id) ? "path" : "", unrelated ? "unrelated" : ""]
            .filter(Boolean).join(" ");
          return `<line class="${classes}" data-spatial-edge="${esc(edge.id)}"
            data-source-id="${esc(edge.source)}" data-target-id="${esc(edge.target)}"
            x1="${source.screenX}" y1="${source.screenY}" x2="${target.screenX}" y2="${target.screenY}">
            <title>${esc(edge.source)} ${esc(edge.rel)} ${esc(edge.target)}</title>
          </line>`;
        }).join("");
        const rovingId = projected.nodes.some((node) => node.id === state.selectedNodeId)
          ? state.selectedNodeId
          : projected.nodes.at(-1)?.id;
        const nodeSvg = projected.nodes.map((node) => {
          const selected = state.selectedNodeId === node.id;
          const isContext = state.contextNodeId === node.id;
          const depth = context?.depth.get(node.id);
          const contextClass = !context ? "" : isContext ? "context" :
            depth === 1 ? "depth-1" : depth === 2 ? "depth-2" : "unrelated";
          const match = matches.includes(node.id);
          const relationships = model.edges.filter((edge) => edge.source === node.id || edge.target === node.id).length;
          const health = (node.health || []).filter((item) => item !== "healthy");
          const opacity = Math.max(0.48, Math.min(1, node.scale * 1.35));
          const accessibleName = `${node.title}, ${node.type}, ${node.status}, ${relationships} relationships${health.length ? `, health ${health.join(", ")}` : ""}${match ? ", search match" : ""}`;
          return `<foreignObject class="spatial-node-wrap" data-spatial-node="${esc(node.id)}"
              x="${node.screenX - 72}" y="${node.screenY - 24}" width="144" height="64"
              opacity="${opacity}" visibility="${node.visible ? "visible" : "hidden"}">
            <button xmlns="http://www.w3.org/1999/xhtml" class="node-control ${contextClass}"
              data-node-id="${esc(node.id)}" data-action="select" data-id="${esc(node.id)}"
              data-focus-key="node-${esc(node.id)}" data-selected="${selected}" data-search-match="${match}"
              aria-pressed="${selected}" tabindex="${node.id === rovingId ? "0" : "-1"}"
              aria-label="${esc(accessibleName)}" title="${esc(node.title)}">
              ${isContext ? '<span class="context-indicator" aria-hidden="true">◆ </span>' : ""}
              ${health.length ? '<span class="health-marker" aria-hidden="true">!</span>' : ""}
              ${labelIds.has(node.id)
                ? `<span class="visual-label">${esc(node.title)}</span>`
                : `<span class="visual-label" aria-hidden="true">•</span><span class="sr-only">${esc(node.title)}</span>`}
              ${match ? '<span class="match-indicator">Match</span>' : ""}
            </button>
          </foreignObject>`;
        }).join("");
        const cameraTargetId = spatialCameraFocusId === "__centroid__" ? "" : spatialCameraFocusId;
        return `<div class="visualization spatial-stage" role="region" aria-label="Spatial 3D project graph"
            data-immersive="${webglSupported ? "true" : "false"}" tabindex="0">
          <canvas data-spatial-gl aria-hidden="true"></canvas>
          <svg data-spatial-svg data-camera-target-id="${esc(cameraTargetId)}"
            data-camera-yaw="${spatialCamera.yaw}" data-camera-pitch="${spatialCamera.pitch}"
            data-camera-zoom="${spatialCamera.zoom}"
            data-camera-transitioning="${pendingSpatialTarget ? "true" : "false"}"
            viewBox="0 0 1200 760" width="1200" height="760" preserveAspectRatio="none"
            aria-label="Spatial 3D canvas. Use the orbit and zoom controls above, or drag and use the mouse wheel.">
            <rect data-spatial-bg x="0" y="0" width="1200" height="760" fill="transparent" pointer-events="all"></rect>
            ${edgeSvg}${nodeSvg}
          </svg>
          <div class="spatial-tooltip" data-spatial-tooltip aria-hidden="true"></div>
          <p class="spatial-hint" aria-hidden="true">Immersive graph · drag to orbit · wheel to zoom · hover a sphere · select to focus</p>
        </div>`;
      }

      const SPATIAL_VW = 1200;
      const SPATIAL_VH = 760;

      function compileShader(gl, type, src) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, src);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          throw new Error("shader compile failed: " + gl.getShaderInfoLog(shader));
        }
        return shader;
      }
      function makeProgram(gl, vsSrc, fsSrc) {
        const program = gl.createProgram();
        gl.attachShader(program, compileShader(gl, gl.VERTEX_SHADER, vsSrc));
        gl.attachShader(program, compileShader(gl, gl.FRAGMENT_SHADER, fsSrc));
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          throw new Error("program link failed: " + gl.getProgramInfoLog(program));
        }
        return program;
      }

      const SPHERE_VS = `
        attribute vec2 aPos; attribute float aSize; attribute vec3 aColor;
        attribute float aAlpha; attribute float aRing;
        varying vec3 vColor; varying float vAlpha; varying float vRing;
        void main(){ gl_Position=vec4(aPos,0.0,1.0); gl_PointSize=aSize;
          vColor=aColor; vAlpha=aAlpha; vRing=aRing; }`;
      const SPHERE_FS = `
        precision mediump float;
        varying vec3 vColor; varying float vAlpha; varying float vRing;
        void main(){
          vec2 uv = gl_PointCoord*2.0-1.0;
          float r2 = dot(uv,uv);
          if(r2>1.0) discard;
          float z = sqrt(max(0.0,1.0-r2));
          vec3 n = vec3(uv, z);
          vec3 lightDir = normalize(vec3(-0.35,-0.55,0.75));
          float diff = clamp(dot(n,lightDir),0.0,1.0);
          float rim = pow(1.0-z, 2.2)*0.55;
          float spec = pow(clamp(dot(reflect(-lightDir,n),vec3(0.0,0.0,1.0)),0.0,1.0), 20.0)*0.5;
          vec3 col = vColor*(0.34+diff*0.82) + vColor*rim + vec3(spec);
          float a = vAlpha * smoothstep(1.0,0.82,r2);
          if(vRing>0.5){
            float ring = smoothstep(0.70,0.80,r2)*(1.0-smoothstep(0.93,1.0,r2));
            col = mix(col, vec3(1.0), ring*0.95);
          }
          gl_FragColor = vec4(col, a);
        }`;
      const GLOW_FS = `
        precision mediump float;
        varying vec3 vColor; varying float vAlpha; varying float vRing;
        void main(){
          vec2 uv = gl_PointCoord*2.0-1.0;
          float r = length(uv);
          if(r>1.0) discard;
          float a = exp(-r*r*3.0) * vAlpha * (vRing>0.5?0.9:0.5);
          gl_FragColor = vec4(vColor, a);
        }`;
      const EDGE_VS = `
        attribute vec2 aPos; attribute vec4 aColor; varying vec4 vC;
        void main(){ gl_Position=vec4(aPos,0.0,1.0); vC=aColor; }`;
      const EDGE_FS = `
        precision mediump float; varying vec4 vC;
        void main(){ gl_FragColor = vC; }`;

      function setupSpatialGL() {
        if (!webglSupported) return null;
        const canvas = app.querySelector("[data-spatial-gl]");
        if (!canvas) return null;
        if (spatialGL && spatialGL.canvas === canvas) return spatialGL;
        if (spatialGL && spatialGL.canvas !== canvas) {
          try { spatialGL.gl.getExtension("WEBGL_lose_context")?.loseContext(); } catch (_) { /* ignore */ }
          spatialGL = null;
        }
        try {
          const gl = canvas.getContext("webgl", { alpha: true, antialias: true, premultipliedAlpha: false })
            || canvas.getContext("experimental-webgl");
          if (!gl) return null;
          spatialGL = {
            canvas, gl,
            sphere: makeProgram(gl, SPHERE_VS, SPHERE_FS),
            glow: makeProgram(gl, SPHERE_VS, GLOW_FS),
            edge: makeProgram(gl, EDGE_VS, EDGE_FS),
            pointBuffer: gl.createBuffer(),
            edgeBuffer: gl.createBuffer(),
          };
          return spatialGL;
        } catch (error) {
          spatialGL = null;
          app.querySelector(".spatial-stage")?.setAttribute("data-immersive", "false");
          return null;
        }
      }

      function drawSpatialGL(projected) {
        const ctx = spatialGL;
        if (!ctx || !projected || !spatialGLStyle) return;
        const { gl, canvas } = ctx;
        try {
          const dpr = Math.min(2, window.devicePixelRatio || 1);
          const cw = Math.max(1, Math.round(canvas.clientWidth * dpr));
          const ch = Math.max(1, Math.round(canvas.clientHeight * dpr));
          if (canvas.width !== cw || canvas.height !== ch) { canvas.width = cw; canvas.height = ch; }
          gl.viewport(0, 0, cw, ch);
          gl.clearColor(0, 0, 0, 0);
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.enable(gl.BLEND);
          gl.disable(gl.DEPTH_TEST);

          const style = spatialGLStyle;
          const visible = projected.nodes.filter((node) => node.visible);
          const depths = visible.map((node) => node.depth);
          const minDepth = depths.length ? Math.min(...depths) : 0;
          const maxDepth = depths.length ? Math.max(...depths) : 1;
          const depthSpan = Math.max(1, maxDepth - minDepth);
          const sizeScale = Math.min(cw, ch) / 760;

          if (projected.edges.length) {
            const verts = [];
            for (const edge of projected.edges) {
              const s = edge.sourcePoint, t = edge.targetPoint;
              if (!s?.visible || !t?.visible) continue;
              const path = style.pathEdgeIds.has(edge.id);
              const unrelated = style.contextIds && (!style.contextIds.has(edge.source) || !style.contextIds.has(edge.target));
              let r = 0.62, g = 0.68, b = 0.85, a = unrelated ? 0.12 : 0.28;
              if (path) { r = 1.0; g = 0.85; b = 0.4; a = 0.85; }
              verts.push((s.screenX / SPATIAL_VW) * 2 - 1, 1 - (s.screenY / SPATIAL_VH) * 2, r, g, b, a);
              verts.push((t.screenX / SPATIAL_VW) * 2 - 1, 1 - (t.screenY / SPATIAL_VH) * 2, r, g, b, a);
            }
            if (verts.length) {
              gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
              gl.useProgram(ctx.edge);
              gl.bindBuffer(gl.ARRAY_BUFFER, ctx.edgeBuffer);
              gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(verts), gl.DYNAMIC_DRAW);
              const stride = 6 * 4;
              const posLoc = gl.getAttribLocation(ctx.edge, "aPos");
              const colLoc = gl.getAttribLocation(ctx.edge, "aColor");
              gl.enableVertexAttribArray(posLoc); gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, stride, 0);
              gl.enableVertexAttribArray(colLoc); gl.vertexAttribPointer(colLoc, 4, gl.FLOAT, false, stride, 2 * 4);
              gl.drawArrays(gl.LINES, 0, verts.length / 6);
            }
          }

          const points = [];
          for (const node of visible) {
            const color = style.colors.get(node.id) || [0.6, 0.6, 0.6];
            const depthFactor = 1 - (node.depth - minDepth) / depthSpan;
            let alpha = 0.4 + 0.6 * depthFactor;
            const selected = node.id === style.selectedId;
            if (style.contextIds) {
              const depth = style.depth?.get(node.id);
              const isContext = node.id === style.contextNodeId;
              alpha *= (isContext || depth === 1) ? 1 : depth === 2 ? 0.55 : 0.22;
            }
            let size = Math.max(14, Math.min(170, 54 * node.scale * sizeScale));
            if (selected) size *= 1.45;
            points.push(
              (node.screenX / SPATIAL_VW) * 2 - 1, 1 - (node.screenY / SPATIAL_VH) * 2,
              size, color[0], color[1], color[2], Math.min(1, alpha), selected ? 1 : 0,
            );
          }
          if (points.length) {
            const array = new Float32Array(points);
            gl.bindBuffer(gl.ARRAY_BUFFER, ctx.pointBuffer);
            const stride = 8 * 4;
            const bindPointAttribs = (program) => {
              gl.useProgram(program);
              const posLoc = gl.getAttribLocation(program, "aPos");
              const sizeLoc = gl.getAttribLocation(program, "aSize");
              const colLoc = gl.getAttribLocation(program, "aColor");
              const alphaLoc = gl.getAttribLocation(program, "aAlpha");
              const ringLoc = gl.getAttribLocation(program, "aRing");
              gl.enableVertexAttribArray(posLoc); gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, stride, 0);
              gl.enableVertexAttribArray(sizeLoc); gl.vertexAttribPointer(sizeLoc, 1, gl.FLOAT, false, stride, 2 * 4);
              gl.enableVertexAttribArray(colLoc); gl.vertexAttribPointer(colLoc, 3, gl.FLOAT, false, stride, 3 * 4);
              gl.enableVertexAttribArray(alphaLoc); gl.vertexAttribPointer(alphaLoc, 1, gl.FLOAT, false, stride, 6 * 4);
              gl.enableVertexAttribArray(ringLoc); gl.vertexAttribPointer(ringLoc, 1, gl.FLOAT, false, stride, 7 * 4);
            };
            for (let i = 0; i < points.length; i += 8) array[i + 2] = points[i + 2] * 2.4;
            gl.bufferData(gl.ARRAY_BUFFER, array, gl.DYNAMIC_DRAW);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
            bindPointAttribs(ctx.glow);
            gl.drawArrays(gl.POINTS, 0, points.length / 8);
            for (let i = 0; i < points.length; i += 8) array[i + 2] = points[i + 2] / 2.4;
            gl.bufferData(gl.ARRAY_BUFFER, array, gl.DYNAMIC_DRAW);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
            bindPointAttribs(ctx.sphere);
            gl.drawArrays(gl.POINTS, 0, points.length / 8);
          }
        } catch (error) {
          spatialGL = null;
          app.querySelector(".spatial-stage")?.setAttribute("data-immersive", "false");
        }
      }

      function updateSpatialTooltip(clientX, clientY) {
        if (!spatialTooltipEl || !activeSpatialProjection) return;
        const stage = spatialTooltipEl.parentElement;
        if (!stage) return;
        const rect = stage.getBoundingClientRect();
        const vx = ((clientX - rect.left) / rect.width) * SPATIAL_VW;
        const vy = ((clientY - rect.top) / rect.height) * SPATIAL_VH;
        let best = null; let bestDist = Infinity;
        for (const node of activeSpatialProjection.nodes) {
          if (!node.visible) continue;
          const dx = node.screenX - vx, dy = node.screenY - vy;
          const d = dx * dx + dy * dy;
          const hitRadius = Math.max(18, 26 * node.scale);
          if (d < hitRadius * hitRadius && d < bestDist) { bestDist = d; best = node; }
        }
        if (!best) { spatialTooltipEl.dataset.visible = "false"; return; }
        spatialTooltipEl.innerHTML =
          `<strong>${esc(best.title)}</strong>` +
          `<span class="tt-type"><span class="type-dot" style="--type-color:${typeColorHex(best.type)}"></span>${esc(best.type)} · ${esc(best.status)}</span>`;
        spatialTooltipEl.style.left = `${(best.screenX / SPATIAL_VW) * rect.width}px`;
        spatialTooltipEl.style.top = `${(best.screenY / SPATIAL_VH) * rect.height}px`;
        spatialTooltipEl.dataset.visible = "true";
      }

      function updateSpatialDom(worldLayout) {
        if (!worldLayout || !spatialCamera) return;
        const spatialSvg = app.querySelector("[data-spatial-svg]");
        spatialSvg?.setAttribute("data-camera-yaw", spatialCamera.yaw);
        spatialSvg?.setAttribute("data-camera-pitch", spatialCamera.pitch);
        spatialSvg?.setAttribute("data-camera-zoom", spatialCamera.zoom);
        const projected = core.projectSpatialLayout(worldLayout, spatialCamera, 1200, 760);
        const byId = new Map(projected.nodes.map((node) => [node.id, node]));
        activeSpatialProjection = {
          ...projected,
          nodes: projected.nodes.map((node) => ({ ...node, x: node.screenX, y: node.screenY })),
        };
        drawSpatialGL(projected);
        for (const node of projected.nodes) {
          const element = spatialDomNodes.get(node.id);
          if (!element) continue;
          element.setAttribute("x", node.screenX - 72);
          element.setAttribute("y", node.screenY - 24);
          element.setAttribute("opacity", Math.max(0.48, Math.min(1, node.scale * 1.35)));
          element.setAttribute("visibility", node.visible ? "visible" : "hidden");
        }
        for (const edge of projected.edges) {
          const element = spatialDomEdges.get(edge.id);
          const source = byId.get(edge.source);
          const target = byId.get(edge.target);
          if (!element || !source || !target) continue;
          element.setAttribute("x1", source.screenX);
          element.setAttribute("y1", source.screenY);
          element.setAttribute("x2", target.screenX);
          element.setAttribute("y2", target.screenY);
          element.style.visibility = source.visible && target.visible ? "visible" : "hidden";
        }
      }

      function scheduleSpatialDomUpdate(worldLayout) {
        if (spatialInputFrame !== null) return;
        spatialInputFrame = requestAnimationFrame(() => {
          spatialInputFrame = null;
          updateSpatialDom(worldLayout);
        });
      }

      function cancelSpatialCameraTransition(completeTarget = false) {
        if (completeTarget && spatialCameraDestination && spatialCamera) {
          spatialCamera = { ...spatialCamera, target: spatialCameraDestination };
        } else if (spatialCameraDestination) {
          spatialCameraFocusId = null;
          spatialCameraTargetKey = null;
          app.querySelector("[data-spatial-svg]")?.setAttribute("data-camera-target-id", "");
        }
        if (spatialCameraFrame !== null) cancelAnimationFrame(spatialCameraFrame);
        spatialCameraFrame = null;
        spatialCameraDestination = null;
        pendingSpatialTarget = null;
        app.querySelector("[data-spatial-svg]")?.setAttribute("data-camera-transitioning", "false");
      }

      function animateSpatialTarget(
        worldLayout,
        target,
        targetKey = spatialCameraTargetKey,
        focusId = spatialCameraFocusId,
      ) {
        cancelSpatialCameraTransition();
        if (!worldLayout || !spatialCamera) return;
        spatialCameraTargetKey = targetKey;
        spatialCameraFocusId = focusId;
        app.querySelector("[data-spatial-svg]")?.setAttribute(
          "data-camera-target-id",
          focusId === "__centroid__" ? "" : focusId || "",
        );
        if (reducedMotion.matches || forcedColors.matches) {
          spatialCamera = { ...spatialCamera, target };
          spatialCameraDestination = null;
          updateSpatialDom(worldLayout);
          return;
        }
        const start = { ...spatialCamera.target };
        spatialCameraDestination = { ...target };
        const startedAt = performance.now();
        const duration = Number.parseFloat(
          getComputedStyle(document.documentElement).getPropertyValue("--motion-context"),
        ) || 220;
        const spatialSvg = app.querySelector("[data-spatial-svg]");
        spatialSvg?.setAttribute("data-camera-transitioning", "true");
        const tick = (now) => {
          const progress = Math.min(1, (now - startedAt) / duration);
          const eased = 1 - Math.pow(1 - progress, 3);
          spatialCamera = {
            ...spatialCamera,
            target: {
              x: start.x + (target.x - start.x) * eased,
              y: start.y + (target.y - start.y) * eased,
              z: start.z + (target.z - start.z) * eased,
            },
          };
          updateSpatialDom(worldLayout);
          if (progress < 1) {
            spatialCameraFrame = requestAnimationFrame(tick);
          } else {
            spatialCameraFrame = null;
            spatialCameraDestination = null;
            spatialSvg?.setAttribute("data-camera-transitioning", "false");
          }
        };
        spatialCameraFrame = requestAnimationFrame(tick);
      }

      function startPendingSpatialTransition(worldLayout) {
        if (!pendingSpatialTarget) return;
        const target = pendingSpatialTarget;
        pendingSpatialTarget = null;
        animateSpatialTarget(worldLayout, target);
      }

      function graphView(model, matches, mindMap, layout) {
        if (!layout) {
          const nodeLimit = index.limits?.spatialNodes ?? 500;
          const edgeLimit = index.limits?.spatialEdges ?? 1000;
          return `<div role="alert" class="empty"><strong>DOC.INDEX.LIMIT_EXCEEDED</strong>
            This graph exceeds the spatial view limit (${nodeLimit} nodes / ${edgeLimit} edges).
            Browse and relationship lists remain available.</div>`;
        }
        const width = layout.width;
        const height = layout.height;
        const fullViewBox = graphViewBox(layout, null);
        const positions = new Map(layout.nodes.map((node) => [node.id, node]));
        const pathIds = pathEdgeIds(model);
        const context = state.contextNodeId ? contextFor(model, state.contextNodeId) : null;
        const labelLimit = index.limits?.visibleLabels ?? 150;
        const pathNodeIds = new Set();
        for (const edge of model.edges) {
          if (!pathIds.has(edge.id)) continue;
          pathNodeIds.add(edge.source);
          pathNodeIds.add(edge.target);
        }
        const prioritized = [...layout.nodes].sort((left, right) => {
          const score = (node) => {
            if (node.id === state.selectedNodeId) return 0;
            if (node.id === state.contextNodeId) return 1;
            if (matches.includes(node.id)) return 2;
            const depth = context?.depth.get(node.id);
            if (depth === 1) return 3;
            if (node.health?.some((item) => item !== "healthy")) return 4;
            if (depth === 2) return 5;
            if (context) return 9;
            return 6;
          };
          return score(left) - score(right) || left.id.localeCompare(right.id);
        });
        const labelCandidates = prioritized.filter((node) => {
          if (node.id === state.selectedNodeId || node.id === state.contextNodeId) return true;
          if (spatialZoomTier === "overview") {
            return node.health?.some((item) => item !== "healthy");
          }
          if (spatialZoomTier === "neighborhood") {
            const depth = context?.depth.get(node.id);
            return depth === 1 || pathNodeIds.has(node.id);
          }
          return true;
        });
        const labelIds = new Set(
          labelCandidates.slice(0, labelLimit).map((node) => node.id),
        );
        if (!layout.nodes.length) return `<div class="empty">No artifacts match these filters.
          <button type="button" data-action="clear-filters" data-focus-key="clear-filters-empty">Clear filters</button>
        </div>`;
        const edgeSvg = layout.edges.map((edge) => {
          const source = positions.get(edge.source), target = positions.get(edge.target);
          if (!source || !target) return "";
          const unrelated = context && (!context.ids.has(edge.source) || !context.ids.has(edge.target));
          const classes = ["edge", pathIds.has(edge.id) ? "path" : "",
            layout.ghostEdgeIds?.has(edge.id) ? "ghost" : "", unrelated ? "unrelated" : ""]
            .filter(Boolean).join(" ");
          const label = spatialZoomTier === "detail"
            ? `<text class="edge-label" x="${(source.x + target.x) / 2}" y="${(source.y + target.y) / 2 - 6}">${esc(edge.rel)}</text>`
            : "";
          return `<g><line id="edge-${esc(edge.id)}" class="${classes}" x1="${source.x}" y1="${source.y}" x2="${target.x}" y2="${target.y}">
            <title>${esc(edge.source)} ${esc(edge.rel)} ${esc(edge.target)}</title></line>${label}</g>`;
        }).join("");
        const laneSvg = mindMap ? "" : layout.lanes.map((lane) =>
          `<text class="lane-label" x="${lane.x + 12}" y="24">${esc(lane.id)} · ${
            layout.nodes.filter((node) =>
              node.lane === lane.id && node.health?.some((item) => item !== "healthy")
            ).length
          } review</text>`
        ).join("");
        const rovingId = layout.nodes.some((node) => node.id === state.selectedNodeId)
          ? state.selectedNodeId
          : layout.nodes.some((node) => node.id === state.contextNodeId)
            ? state.contextNodeId
            : layout.nodes[0]?.id;
        const nodeSvg = layout.nodes.map((node, indexInLayout) => {
          const relationshipCount = model.edges.filter((edge) => edge.source === node.id || edge.target === node.id).length;
          const selected = state.selectedNodeId === node.id;
          const isContext = state.contextNodeId === node.id;
          const depth = context?.depth.get(node.id);
          const contextClass = !context ? "" : isContext ? "context" :
            depth === 1 ? "depth-1" : depth === 2 ? "depth-2" : "unrelated";
          const match = matches.includes(node.id);
          const labelVisible = labelIds.has(node.id);
          const health = (node.health || []).filter((item) => item !== "healthy");
          const accessibleName = `${node.title}, ${node.type}, ${node.status}, ${relationshipCount} relationships${health.length ? `, health ${health.join(", ")}` : ""}${match ? ", search match" : ""}`;
          return `<foreignObject x="${node.x - 72}" y="${node.y - 24}" width="144" height="64">
            <button xmlns="http://www.w3.org/1999/xhtml" class="node-control ${contextClass}"
              style="--type-color:${typeColorHex(node.type)}"
              data-node-id="${esc(node.id)}" data-action="select" data-id="${esc(node.id)}"
              data-focus-key="node-${esc(node.id)}" data-selected="${selected}" data-search-match="${match}"
              aria-pressed="${selected}" tabindex="${node.id === rovingId ? "0" : "-1"}"
              aria-label="${esc(accessibleName)}" title="${esc(node.title)}">
              <span class="type-dot" aria-hidden="true"></span>
              ${isContext ? '<span class="context-indicator" aria-hidden="true">◆ </span>' : ""}
              ${spatialZoomTier === "detail" && health.length ? '<span class="health-marker" aria-hidden="true">!</span>' : ""}
              ${labelVisible ? `<span class="visual-label">${esc(node.title)}</span>` :
                `<span class="visual-label" aria-hidden="true">•</span><span class="sr-only">${esc(node.title)}</span>`}
              ${match ? '<span class="match-indicator">Match</span>' : ""}
            </button></foreignObject>`;
        }).join("");
        const fitViewBox = graphViewBox(layout, mindMap ? null : context);
        const detailViewBox = graphNodeViewBox(
          layout,
          state.selectedNodeId || state.contextNodeId || layout.nodes[0]?.id,
        );
        const initialViewBox = spatialZoomTier === "detail"
          ? detailViewBox
          : spatialZoomTier === "neighborhood"
            ? fitViewBox
            : fullViewBox;
        const usedGraphTypes = [...new Set(layout.nodes.map((node) => node.type))]
          .sort((a, b) => typeRankOf(a) - typeRankOf(b));
        return `${typeLegend(usedGraphTypes)}<div class="visualization" role="region" aria-label="${mindMap ? "Project mind map" : "Project graph"}">
          <svg data-graph-svg data-zoom-tier="${spatialZoomTier}" data-full-viewbox="${esc(fullViewBox)}"
            data-fit-viewbox="${esc(fitViewBox)}" data-detail-viewbox="${esc(detailViewBox)}"
            viewBox="${esc(initialViewBox)}" width="${width}" height="${height}" aria-hidden="false">
            <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker></defs>
            ${laneSvg}${edgeSvg}${nodeSvg}
          </svg>
        </div>`;
      }

      function relationshipList(model, layout, artifactId = null) {
        const byId = new Map(model.nodes.map((node) => [node.id, node]));
        const visibleEdges = layout?.edges || model.edges;
        const edges = artifactId
          ? visibleEdges.filter((edge) => edge.source === artifactId || edge.target === artifactId)
          : visibleEdges;
        const pathIds = pathEdgeIds(model);
        const heading = artifactId ? "Relationships" : `Visible relationships (${edges.length})`;
        return `<section class="relationship-list"><h3>${heading}</h3>
          ${edges.length ? `<ul>${edges.map((edge) => `<li id="list-${esc(edge.id)}" class="${pathIds.has(edge.id) ? "path" : ""}">
            <button data-action="select" data-id="${esc(edge.source)}"
              data-focus-key="relationship-${esc(artifactId || "visible")}-${esc(edge.id)}-source">${esc(byId.get(edge.source)?.title || edge.source)}</button>
            <strong>${esc(edge.rel)}</strong>
            <button data-action="select" data-id="${esc(edge.target)}"
              data-focus-key="relationship-${esc(artifactId || "visible")}-${esc(edge.id)}-target">${esc(byId.get(edge.target)?.title || edge.target)}</button>
            ${pathIds.has(edge.id) ? '<span class="meta">On traced path</span>' : ""}
          </li>`).join("")}</ul>` : '<p class="empty">No visible relationships.</p>'}
        </section>`;
      }

      function details(model) {
        const artifact = artifactById(state.selectedNodeId);
        if (!artifact) return `<div class="empty">
          <h2 id="details-heading" tabindex="-1">Artifact details</h2>
          <p>Select an artifact to inspect its context.</p>
          <button disabled aria-describedby="explore-disabled-reason">Explore neighborhood</button>
          <p id="explore-disabled-reason" class="meta">Select an artifact before exploring its neighborhood.</p>
        </div>`;
        const health = core.artifactHealth(artifact);
        const outside = !model.nodes.some((node) => node.id === artifact.id);
        const source = sourceState.artifactId === artifact.id ? sourceState : { status: "idle", text: "" };
        const sourceHref = safeHrefFor(artifact);
        const pathCount = pathEdgeIds(model).size;
        return `<article class="details-card">
          <div><span class="badge">${esc(artifact.type)}</span> <span class="badge">${esc(artifact.status)}</span>
            ${health.map((item) => `<span class="badge ${esc(item)}">${esc(item)}</span>`).join(" ")}</div>
          <h2 id="details-heading" tabindex="-1">${esc(artifact.title)}</h2>
          ${outside ? '<p class="notice">This selection is outside the active filters.</p>' : ""}
          <p class="summary">${esc(artifact.summary || "No summary available.")}</p>
          <dl><dt>Artifact ID</dt><dd><code>${esc(artifact.id)}</code></dd>
            <dt>Owner</dt><dd>${esc(artifact.owner || "Unassigned")}</dd>
            <dt>Review by</dt><dd>${esc(artifact.reviewBy || "Frozen record")}</dd></dl>
          <div class="detail-actions">
            <button data-action="explore" data-focus-key="explore-${esc(artifact.id)}"
              ${outside ? 'disabled aria-describedby="outside-filter-reason"' : ""}>Explore neighborhood</button>
            <button data-action="route" data-value="details" data-focus-key="open-details">Open details</button>
            <button data-action="path" data-value="grounding" data-focus-key="path-grounding"
              aria-pressed="${state.pathMode === "grounding"}">Trace grounding</button>
            <button data-action="path" data-value="impact" data-focus-key="path-impact"
              aria-pressed="${state.pathMode === "impact"}">Trace impact</button>
            <button data-action="path" data-value="proof" data-focus-key="path-proof"
              aria-pressed="${state.pathMode === "proof"}">Show proofs</button>
            ${sourceHref
              ? `<a class="button" href="${esc(sourceHref)}">Open source file</a>`
              : '<span class="button" aria-disabled="true">Source path unavailable</span>'}
          </div>
          ${state.pathMode !== "none"
            ? `<p>${pathCount
                ? `${pathCount} relationship${pathCount === 1 ? "" : "s"} highlighted for the ${esc(state.pathMode)} trace.`
                : `No ${esc(state.pathMode)} relationships are available from this artifact.`}</p>`
            : ""}
          ${outside ? '<p id="outside-filter-reason" class="meta">Clear the excluding filters before exploring this artifact.</p>' : ""}
          ${state.contextNodeId ? '<button data-action="leave-context" data-focus-key="leave-context-details">Leave neighborhood</button>' : ""}
          ${relationshipList(model, null, artifact.id)}
          <section><h3>Source and diagrams</h3>
            <button data-action="load-source" data-focus-key="load-source" ${source.status === "loading" ? "disabled" : ""}>
              ${source.status === "loading" ? "Loading source..." : source.status === "error" ? "Retry source body" : source.status === "ready" ? "Reload source body" : "Load source body"}
            </button>
            ${source.status === "loading" ? "<p>Loading source...</p>" : ""}
            ${source.status === "error" ? `<p role="alert"><strong>${esc(source.errorCode || "DOC.SOURCE.FETCH_FAILED")}</strong> The source body is unavailable; metadata and links remain usable.</p>` : ""}
            ${source.status === "ready" ? `<pre>${esc(source.text)}</pre>` : ""}
            ${(artifact.diagrams || []).map((diagram) => `<details><summary>${esc(diagram.title)}</summary><pre>${esc(diagram.mermaid)}</pre></details>`).join("")}
          </section>
        </article>`;
      }

      function restoreFocus(options) {
        if (options.searchSelection) {
          const search = document.getElementById("search");
          if (document.activeElement !== search) {
            search?.focus();
            search?.setSelectionRange(options.searchSelection.start, options.searchSelection.end);
          }
          return;
        }
        let target = options.focusHeading ? document.getElementById(options.focusHeading) : null;
        if (!target && options.focusKey) {
          target = app.querySelector(`[data-focus-key="${CSS.escape(options.focusKey)}"]`) ||
            document.getElementById(options.focusKey);
        }
        if (target && !target.closest("[hidden]") && target.getClientRects().length > 0 &&
            getComputedStyle(target).visibility !== "hidden") target.focus();
        else if (options.restoreFallback) focusRestoredState();
      }

      function replaceShell(markup) {
        const liveSearchInput = document.activeElement?.id === "search"
          ? document.activeElement
          : null;
        const currentHeader = liveSearchInput?.closest(".app-header");
        const currentSearch = liveSearchInput?.closest(".search");
        if (!liveSearchInput || currentHeader?.parentElement !== app || !currentSearch) {
          app.innerHTML = markup;
          return;
        }

        const template = document.createElement("template");
        template.innerHTML = markup.trim();
        const nextHeader = template.content.querySelector(".app-header");
        const nextSearch = nextHeader?.querySelector(".search");
        const nextSearchInput = nextSearch?.querySelector("#search");
        if (!nextHeader || !nextSearch || !nextSearchInput) {
          app.innerHTML = markup;
          return;
        }

        if (liveSearchInput.value !== nextSearchInput.value) {
          liveSearchInput.value = nextSearchInput.value;
          liveSearchInput.setSelectionRange(
            nextSearchInput.value.length,
            nextSearchInput.value.length,
          );
        }
        currentHeader.querySelector(".brand")?.replaceWith(nextHeader.querySelector(".brand"));
        currentSearch.querySelector("label")?.replaceWith(nextSearch.querySelector("label"));
        currentSearch.querySelector('[data-value="previous"]')
          ?.replaceWith(nextSearch.querySelector('[data-value="previous"]'));
        currentSearch.querySelector('[data-value="next"]')
          ?.replaceWith(nextSearch.querySelector('[data-value="next"]'));
        currentSearch.querySelector(".match-count")?.replaceWith(nextSearch.querySelector(".match-count"));

        for (const child of [...app.childNodes]) {
          if (child !== currentHeader) child.remove();
        }
        for (const child of [...template.content.childNodes]) {
          if (child !== nextHeader) app.appendChild(child);
        }
      }

      function render(options = {}) {
        cancelSpatialCameraTransition(true);
        if (spatialInputFrame !== null) cancelAnimationFrame(spatialInputFrame);
        spatialInputFrame = null;
        spatialDrag = null;
        spatialDomNodes = new Map();
        spatialDomEdges = new Map();
        let model;
        try { model = core.normalizeProjection(index, state.filters); }
        catch (error) {
          recoveryShell(
            "DOC.INDEX.INVALID",
            "The project map could not be loaded. Repair the graph and regenerate the index.",
          );
          return;
        }
        if (!index.artifacts.length) {
          app.dataset.loadState = "empty";
          app.innerHTML = `<header class="app-header"><div class="brand"><h1>${esc(index.project || "Project")} Docs Explorer</h1></div></header>
            ${knowledgeSurfaces(safeKnowledgeSurfaces())}
            <main id="main"><section class="notice" data-first-run-empty>
              <strong>No indexed artifacts yet.</strong>
              Add graph frontmatter, then run <code>docs-graph.py derive</code> to build the project map.
            </section></main>`;
          return;
        }
        const exceeded = indexLimitFailure();
        if (exceeded) {
          recoveryShell(
            "DOC.INDEX.LIMIT_EXCEEDED",
            `The project index exceeds the supported ${exceeded} limit. Use docs-graph.py context or reduce the corpus.`,
          );
          return;
        }
        const spatialNodeLimit = index.limits?.spatialNodes ?? 500;
        const spatialEdgeLimit = index.limits?.spatialEdges ?? 1000;
        if (state.projection === "spatial3d" &&
            (!spatial3DSupported || model.nodes.length > spatialNodeLimit || model.edges.length > spatialEdgeLimit)) {
          const reason = spatial3DSupported
            ? `DOC.SPATIAL3D.LIMIT_EXCEEDED Spatial 3D supports up to ${spatialNodeLimit} nodes and ${spatialEdgeLimit} relationships.`
            : "DOC.SPATIAL3D.UNAVAILABLE Spatial 3D is unavailable in this browser.";
          state = core.normalizeState(
            { ...state, projection: "graph", notice: `${reason} The same semantic state is shown in Graph.` },
            index,
            narrow(),
            { preserveNotice: true },
          );
          const encoded = core.encodeUrlState(state);
          history.replaceState(history.state, "", encoded ? "#" + encoded : location.pathname);
        }
        app.dataset.loadState = "loaded";
        const matches = core.searchMatches(model.nodes, state.search.query);
        const matchingSurfaces = knowledgeSurfaceMatches();
        const surfaceMatchCount = state.search.query.trim() ? matchingSurfaces.length : 0;
        const totalSearchMatches = matches.length + surfaceMatchCount;
        if (activeMatchIndex >= matches.length) activeMatchIndex = 0;
        const selectedOutsideFilters = state.selectedNodeId &&
          !model.nodes.some((node) => node.id === state.selectedNodeId);
        document.body.dataset.route = state.route;
        if (state.contextNodeId) document.body.dataset.context = state.contextNodeId;
        else delete document.body.dataset.context;
        let layout = null;
        let projectedSpatial = null;
        let relationshipLayout = null;
        let layoutError = null;
        if (state.projection !== "browse") {
          try {
            layout = spatialLayout(model, state.projection);
            if (state.projection === "spatial3d" && layout) {
              projectedSpatial = spatialProjection(layout);
              relationshipLayout = projectedSpatial;
            } else {
              activeSpatialProjection = null;
              relationshipLayout = layout;
            }
          } catch (error) {
            if (state.projection === "spatial3d") {
              state = core.normalizeState(
                { ...state, projection: "graph", notice: "DOC.SPATIAL3D.RENDER_FAILED Spatial 3D could not render. The same semantic state is shown in Graph." },
                index,
                narrow(),
                { preserveNotice: true },
              );
              const encoded = core.encodeUrlState(state);
              history.replaceState(history.state, "", encoded ? "#" + encoded : location.pathname);
              try {
                layout = spatialLayout(model, "graph");
                relationshipLayout = layout;
              } catch (fallbackError) {
                layoutError = fallbackError;
              }
            } else layoutError = error;
          }
        }

        }));
        app.querySelectorAll("[data-node-id]").forEach((node) => node.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); event.currentTarget.click(); }
          if (event.key === "Escape") {
            event.preventDefault();
            if (state.contextNodeId) commit(
              { type: "LEAVE_CONTEXT" },
              { nextFocusKey: "projection-toolbar" },
            );
            else app.querySelector('[data-focus-key="projection-toolbar"]')?.focus();
          }
          if (event.key.startsWith("Arrow")) {
            const navigationLayout = state.projection === "spatial3d"
              ? {
                  ...activeSpatialProjection,
                  nodes: (activeSpatialProjection?.nodes || []).filter((candidate) =>
                    candidate.visible &&
                    candidate.screenX >= 0 &&
                    candidate.screenX <= activeSpatialProjection.width &&
                    candidate.screenY >= 0 &&
                    candidate.screenY <= activeSpatialProjection.height),
                }
              : layoutModel;
            const target = navigationLayout
              ? core.directionalNeighbor(navigationLayout.nodes, event.currentTarget.dataset.nodeId, event.key)
              : null;
            if (target) {
              const targetNode = app.querySelector(`[data-node-id="${CSS.escape(target)}"]`);
              if (targetNode && targetNode.getClientRects().length > 0 &&
                  getComputedStyle(targetNode).visibility !== "hidden") {
                event.preventDefault();
                targetNode.tabIndex = 0;
                targetNode.focus();
                if (document.activeElement === targetNode) {
                  app.querySelectorAll("[data-node-id]").forEach((candidate) => {
                    if (candidate !== targetNode) candidate.tabIndex = -1;
                  });
                }
              }
            }
          }
        }));
      }
      history.replaceState({
        ...(history.state || {}),
        docsExplorerDepth: appHistoryDepth,
      }, "", location.href);
      render();
      requestAnimationFrame(() => requestAnimationFrame(() => {
        if (window.__docsExplorerLoadState === "failed") return;
        const browseControl = app.querySelector('[role="tab"][data-value="browse"]:not([disabled])');
        const stableEmptyState = app.querySelector("[data-first-run-empty]");
        if (!browseControl && !stableEmptyState) {
          window.__docsExplorerLoadFailed("DOC.INDEX.UNAVAILABLE");
          return;
        }
        clearTimeout(window.__docsExplorerLoadTimer);
        window.__docsExplorerLoadState = "ready";
        app.dataset.state = "ready";
      }));
    })();
  </script>
</body>
</html>
