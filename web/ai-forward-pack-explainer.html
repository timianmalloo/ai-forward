<title>AI-Forward Pack — The Interactive Explainer</title>
<!--
  SELF-CONTAINED interactive explainer for the AI-Forward Pack.
  - Content is embedded in this file (no fetch, opens via file://).
  - Runtime: React 18 UMD + htm (no build step) — the same house convention used by
    docs/index.html (the Docs Explorer). Libraries load from CDN; an offline banner shows
    if they cannot.
  - It explains the KNOWLEDGE (the constitution), the SKILLS (the 10 workflows), the
    RIGOR PROTOCOL (the reasoning spine), the PERSONAS (the dual-mode council), and the
    UI TEMPLATE APPROACH (the archetype grammar) — with a TABLE of every template type and
    LINKABLE, rendered MOCKUPS of each one so a reader can see-then-choose.
  Generated by /document. Companion to web/ai-forward-pack-overview.jsx (the downloadable
  overview). True-to-source as of the documented commit recorded in docs/_meta.json.
-->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
<style>
  :root{
    --bg:#0b0d12; --panel:#11141b; --panel-2:#161a23; --line:#262c3a; --line-2:#323a4d;
    --ink:#e7ecf5; --muted:#9aa6bd; --faint:#6b7689;
    --accent:#7c9cff; --accent-2:#5ad1c7; --warn:#f2b347; --bad:#ff6b6b; --good:#56d364;
    --hard:#ff7a7a; --soft:#f2b347; --adv:#7fb2ff;
    --radius:14px; --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  [data-theme="light"]{
    --bg:#f5f7fb; --panel:#ffffff; --panel-2:#f0f3f9; --line:#e2e7f0; --line-2:#d2dae8;
    --ink:#1a2233; --muted:#56627a; --faint:#8a94a8;
    --accent:#3b5bdb; --accent-2:#0ca678; --shadow:0 10px 28px rgba(20,40,80,.10);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
       font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  code{font-family:var(--mono);font-size:.86em;background:var(--panel-2);
       border:1px solid var(--line);border-radius:6px;padding:1px 6px}
  h1,h2,h3,h4{line-height:1.25;margin:0 0 .4em}
  h2{font-size:clamp(22px,3vw,30px);letter-spacing:-.01em}
  h3{font-size:19px}
  p{margin:0 0 1em}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .mono{font-family:var(--mono)}

  /* ---- offline banner ---- */
  #offline{display:none;background:var(--warn);color:#1a1200;text-align:center;
           padding:8px 14px;font-size:13px;font-weight:600}

  /* ---- top nav ---- */
  header.top{position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);
    background:color-mix(in srgb,var(--bg) 82%,transparent);border-bottom:1px solid var(--line)}
  .topbar{display:flex;align-items:center;gap:14px;height:58px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
  .brand .dot{width:11px;height:11px;border-radius:3px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 14px var(--accent)}
  nav.sections{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap;overflow:auto}
  nav.sections a{font-size:13px;color:var(--muted);padding:6px 10px;border-radius:8px;white-space:nowrap}
  nav.sections a:hover{background:var(--panel-2);color:var(--ink);text-decoration:none}
  .tbtn{margin-left:6px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px}

  /* ---- hero ---- */
  .hero{padding:64px 0 36px;border-bottom:1px solid var(--line);
    background:radial-gradient(1100px 380px at 78% -10%,rgba(124,156,255,.16),transparent 60%),
               radial-gradient(800px 300px at 12% 0%,rgba(90,209,199,.10),transparent 55%)}
  .kicker{display:inline-block;font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--accent-2);border:1px solid var(--line-2);border-radius:999px;padding:5px 12px;margin-bottom:18px}
  .hero h1{font-size:clamp(32px,5.4vw,56px);letter-spacing:-.02em;margin-bottom:.25em}
  .hero p.lead{font-size:clamp(16px,2vw,20px);color:var(--muted);max-width:760px}
  .stat-row{display:flex;gap:34px;flex-wrap:wrap;margin-top:30px}
  .stat .n{font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .stat .l{font-size:12.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}

  /* ---- section scaffolding ---- */
  section.block{padding:58px 0;border-bottom:1px solid var(--line)}
  .seclabel{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .sechead{max-width:820px;margin-bottom:30px}
  .sechead p{color:var(--muted);font-size:17px}

  /* ---- cards / grids ---- */
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:920px){.g2,.g3,.g4{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px}
  .card h3{margin-bottom:6px;font-size:16.5px}
  .card .tag{font-size:11px;color:var(--faint);font-family:var(--mono)}
  .card p{font-size:14px;color:var(--muted);margin:0}
  .pill{display:inline-block;font-size:11px;font-weight:600;border-radius:999px;padding:3px 9px;
    border:1px solid var(--line-2);color:var(--muted)}
  .pill.hard{color:var(--hard);border-color:color-mix(in srgb,var(--hard) 50%,var(--line))}
  .pill.soft{color:var(--soft);border-color:color-mix(in srgb,var(--soft) 50%,var(--line))}
  .pill.adv{color:var(--adv);border-color:color-mix(in srgb,var(--adv) 45%,var(--line))}

  /* ---- rigor stages ---- */
  .stage-rail{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .stage-rail button{flex:1;min-width:120px;text-align:left;cursor:pointer;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:12px 13px;color:var(--ink);transition:.15s}
  .stage-rail button:hover{border-color:var(--line-2)}
  .stage-rail button.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;
    background:color-mix(in srgb,var(--accent) 10%,var(--panel))}
  .stage-rail .sn{font-family:var(--mono);font-size:12px;color:var(--accent-2)}
  .stage-rail .st{font-weight:700;font-size:14px;display:block;margin-top:3px}
  .stage-rail .sg{font-size:12px;color:var(--faint);display:block}
  .stage-body{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;min-height:220px}
  .stage-body .verb{font-family:var(--mono);font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:.1em}
  .stage-body ul{margin:.4em 0 0;padding-left:18px} .stage-body li{margin:.3em 0;color:var(--muted)}
  .stage-body .exit{margin-top:14px;font-size:13px;border-left:3px solid var(--accent-2);padding:6px 12px;
    background:var(--panel-2);border-radius:0 8px 8px 0}
  .stage-body .norush{margin-top:10px;font-size:13px;color:var(--warn)}

  table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  table.tbl th,table.tbl td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  table.tbl th{background:var(--panel-2);font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  table.tbl tr:last-child td{border-bottom:none}
  table.tbl code{font-size:11.5px;white-space:nowrap}

  /* ---- workflow chain ---- */
  .chain{display:flex;align-items:stretch;gap:0;flex-wrap:wrap;margin:6px 0 22px}
  .chain .step{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:9px 14px 9px 14px;font-family:var(--mono);font-size:12.5px;margin:5px 16px 5px 0}
  .chain .step::after{content:"→";position:absolute;right:-15px;top:50%;transform:translateY(-50%);color:var(--faint)}
  .chain .step:last-child::after{content:""}
  .chain .step b{color:var(--accent)}

  /* ---- grammar facet chips ---- */
  .facets{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 0}
  .facet{font-family:var(--mono);font-size:11.5px;border:1px solid var(--line-2);border-radius:7px;
    padding:3px 8px;color:var(--muted);background:var(--panel-2)}
  .facet b{color:var(--accent-2)}
  pre.ebnf{background:#0a0c11;border:1px solid var(--line);border-radius:12px;padding:16px;overflow:auto;
    font-family:var(--mono);font-size:12px;color:#c8d3ea;line-height:1.5}
  [data-theme="light"] pre.ebnf{background:#0c1018;color:#cdd8ef}

  /* ============ MOCKUPS ============ */
  .mock-grid{display:grid;gap:22px;grid-template-columns:repeat(2,1fr)}
  @media(max-width:980px){.mock-grid{grid-template-columns:1fr}}
  .mock-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;scroll-margin-top:80px}
  .mock-card:target{box-shadow:0 0 0 2px var(--accent);border-color:var(--accent)}
  .mock-head{display:flex;align-items:baseline;gap:10px;padding:14px 16px 6px;flex-wrap:wrap}
  .mock-head .id{font-family:var(--mono);font-size:12px;color:var(--accent-2);font-weight:700}
  .mock-head h3{margin:0;font-size:16px}
  .mock-head .cat{font-size:11px;color:var(--faint);margin-left:auto}
  .mock-head .anchor{font-size:12px;color:var(--faint);text-decoration:none}
  .mock-desc{padding:0 16px 10px;font-size:13px;color:var(--muted)}
  .mock-sig{padding:0 16px 12px}
  .mock-sig code{font-size:10.5px;white-space:normal;line-height:1.7;display:block;padding:8px 10px;
    color:var(--muted)}
  .mock-sig code b{color:var(--accent-2)}
  .exemplars{padding:0 16px 14px;font-size:12px;color:var(--faint)}
  .exemplars a{color:var(--muted)}

  /* the device frame holding the rendered preview */
  .device{margin:0 16px 16px;border:1px solid var(--line-2);border-radius:10px;overflow:hidden;
    background:var(--vp-bg,#0e1118);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
  .device .bar{height:26px;background:#1b2030;display:flex;align-items:center;gap:6px;padding:0 10px;
    border-bottom:1px solid #000}
  .device .bar i{width:9px;height:9px;border-radius:50%;display:inline-block;background:#39405a}
  .device .bar .u{margin-left:8px;height:13px;flex:1;background:#0f1320;border-radius:4px;max-width:60%}
  .vp{height:300px;overflow:hidden;position:relative;font-size:11px;color:#cfd8ee}
  .vp *{box-sizing:border-box}

  /* shared mock primitives */
  .m-row{display:flex} .m-col{display:flex;flex-direction:column}
  .chiprow{display:flex;gap:5px;flex-wrap:wrap}
  .dotpill{display:flex;gap:6px;align-items:center}
  .dotpill i{width:18px;height:6px;border-radius:99px;background:#2c3550}
  .badge{font-size:9px;padding:1px 6px;border-radius:99px;background:#222a3d;color:#9fb0d0}

  footer{padding:46px 0 70px;color:var(--faint);font-size:13px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:11px;height:11px;border-radius:3px;display:inline-block}

  details.note{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:10px}
  details.note summary{cursor:pointer;font-weight:600;font-size:14px}
  .conf{font-family:var(--mono);font-size:11px;padding:1px 7px;border-radius:6px;border:1px solid var(--line-2)}
  .conf.v{color:var(--good)} .conf.i{color:var(--accent)} .conf.f{color:var(--warn)}
</style>
</head>

<script>
window.addEventListener("DOMContentLoaded",function(){
  if(!(window.React && window.ReactDOM && window.htm)){
    document.getElementById("offline").style.display="block"; return;
  }
  const {useState, useEffect} = React;
  const html = htm.bind(React.createElement);

  /* =================================================================
     DATA — true to the pack source (.claude/knowledge, .claude/skills)
     ================================================================= */

  const STATS = [
    ["10","Skills"],["23","Personas"],["6","Rigor stages"],["16","UI archetypes"],
    ["19","Knowledge docs"],["2","Modes (peer/adversary)"]
  ];

  // The Rigor Protocol — rigor-protocol.md
  const STAGES = [
    { n:"0", t:"Rush Interdiction", g:"Don't answer yet",
      verb:"Interdict",
      body:"Above T0 the agent MUST NOT state a solution, conclusion, root cause, or API contract before it has produced a frame. Three rules hold throughout, and the work is grounded in what already exists by traversing the knowledge graph (not re-discovering files).",
      items:[
        "No conclusion without a confidence label — Verified / Inferred / Flagged.",
        "No \"Why?\" without a \"Why do I believe that?\" — every claim paired with the evidence that beats its closest competitor.",
        "First-plausible is a trap, not a finish — the first framing/cause/API is a hypothesis to test.",
        "Ground first: traverse typed edges 1–2 hops (implements / refines / depends-on upstream; tested-by / documents downstream; uses-term into the glossary). Drift from an upstream artifact stops the work."
      ],
      exit:"A frame exists before any answer. Upstream artifacts loaded and quoted.",
      norush:"Tell: if you're writing the answer in paragraph one, you skipped Stage 0. Delete it and frame." },
    { n:"1", t:"OPEN", g:"Map the whole before a part",
      verb:"Open wide",
      body:"Produce a wide, unbiased picture of the problem space before any narrowing — the wide mouth of the funnel plus free recall, Paul–Elder element decomposition, and a systems sketch.",
      items:[
        "Restate the request in your own words; name the ambiguities.",
        "Free-recall the space — candidate framings, scenarios (baseline / adversarial / wildcard), the boundary set (empty, null, max, concurrent, malformed, hostile) — without judging any yet.",
        "Decompose by the eight Paul–Elder elements: purpose, question, information, concepts, assumptions, inferences, implications, point of view.",
        "Sketch the system, not just the task: stocks, flows, feedback loops, delays, boundary. Is the obvious intervention the high-leverage one, or just the visible one?",
        "List the unknowns — every contract and product/domain fact not yet established."
      ],
      exit:"A written frame: restated question, candidate framings, boundary set, element decomposition, system sketch, unknowns. No solution code yet.",
      norush:"Breadth is mandatory before depth — produce at least one genuine alternative framing and say why it's plausible." },
    { n:"2", t:"INTERROGATE", g:"Drill each element with precision",
      verb:"Interrogate",
      body:"Turn the broad frame into sharp, answerable questions using Precision Questioning — one question, one answer — governed by the nine Paul–Elder standards. Seven analytic question types replace the vague \"why\".",
      items:[
        "Clarification — what exactly does this term/scope/requirement mean? Catches scope blur.",
        "Assumption — what is taken as given? Catches silent premises.",
        "Basic-critical — what is the data, and is the source authoritative? Catches the confident guess.",
        "Cause — by what specific mechanism does X produce Y, and which competing cause is ruled out?",
        "Effect / implication — if true, what must also be true downstream?",
        "Evidence (for / against) — what weighs each way, and on balance? Catches confirmation bias.",
        "Go / No-Go — is this decided enough to act on?"
      ],
      exit:"A ranked list of the few questions that determine the answer, each tagged with the evidence that would resolve it. Assumptions marked to-verify or accepted-with-rationale.",
      norush:"One question, one answer. Don't bundle five concerns into one sweeping paragraph." },
    { n:"3", t:"EVIDENCE", g:"Establish, do not assert",
      verb:"Establish",
      body:"Convert sharp questions into grounded facts — this is where the agent earns the right to a conclusion. Contract due-diligence + verify-by-execution + verify-cause-by-data. For anything unfamiliar, the Spike Protocol is mandatory: read the source, run a PoC.",
      items:[
        "For each contract: establish identity/version, semantics, nullability, boundaries, error model, security, concurrency, lifecycle, idempotency, cost — cite the source, confirm by execution where cheap.",
        "For each causal claim: reproduce, vary the input — if removing it removes the effect and restoring it restores it, it's verified; otherwise it's still a hypothesis.",
        "For each product/domain fact: name the comparable, reference, standard, or user evidence.",
        "Promote or flag — every Stage-2 assumption becomes Verified (with source/result) or stays Flagged as carried risk."
      ],
      exit:"A confidence ledger: one row per load-bearing claim with evidence, source/version/file:line/run, the disconfirming test tried, and the label.",
      norush:"No claim outruns its evidence. \"I expect X\" and \"the run shows X\" are different sentences." },
    { n:"4", t:"DISCONFIRM", g:"Try to break your own conclusion",
      verb:"Disconfirm",
      body:"Self-review is structurally insufficient — the mind that formed a conclusion is worst-placed to find its flaw. This stage manufactures the missing adversary: internally first, then externally for T2.",
      items:[
        "Chain-of-Verification — write the draft, generate its verification questions, answer them independently of the draft, regenerate keeping only what survived.",
        "Falsification — state the input or interleaving that would make the claim false; is that case in your tests?",
        "Disconfirmation — assert the negation as if confident and require the design or data to defeat it with evidence.",
        "Self-consistency — re-reason high-stakes claims by a different route; divergence is a finding, not something to average away.",
        "Convene the adversaries (T2) — run the relevant personas; the author never clears its own hard veto; conflict is the feature, resolved and recorded."
      ],
      exit:"A short adversarial record: verification Q&A, the falsifying input per claim (covered?), disconfirming attempts, and persona verdicts with any veto and its resolution.",
      norush:"Attack before you commit. \"I reviewed it and it looks right\" is not a disconfirmation pass." },
    { n:"5", t:"CONVERGE", g:"Commit with stated residual risk",
      verb:"Converge",
      body:"Close the cone. Deliver the answer the evidence supports — no wider, no narrower — with confidence and limits attached.",
      items:[
        "Name the conclusion, and the one or two strongest alternatives you rejected and why (raw material for an ADR).",
        "State conviction honestly: lead with Verified, then Inferred, then Flagged.",
        "State residual risk: what the evidence does not cover, and the one new fact that would change the conclusion.",
        "Re-ground on long tasks — restate the original request and confirm no drift from earlier decisions."
      ],
      exit:"The conclusion, the rejected alternatives with reasons, the confidence-ledger summary, the residual-risk statement, and the \"what would change my mind\" line.",
      norush:"Match the answer to the evidence — no overreach, no hedging into uselessness. Calibration is the deliverable." }
  ];

  // Knowledge constitution — .claude/knowledge/*
  const KNOWLEDGE = [
    {t:"Body of Knowledge", k:"BoK · D1–D3", d:"The reasoning constitution — how agents think, research, and decide. Three prime directives (correctness over completion; never guess a contract; verification is never self-certified). Where any document conflicts with BoK, BoK wins."},
    {t:"Rigor Protocol", k:"Stages 0–5", d:"The reasoning spine that deepens BoK §II into a named broad-to-narrow path: open, interrogate, establish, disconfirm, converge. The five workflow skills all run on it."},
    {t:"Rules of the Road", k:"Phases 1–8 · T0–T2", d:"The executable layer — what the agent does in order each session, the proportional effort tiers, the gates, the Show-Your-Work contract, the Proof Pack, and the Deviation Protocol. Deploys verbatim as AGENTS.md."},
    {t:"Spike Protocol", k:"read + run", d:"Time-boxed, throwaway investigations that convert an unfamiliar contract into established knowledge before design depends on it — read the source, run a minimal PoC against the boundary set. Mandatory at Rigor Stage 3."},
    {t:"Specification Standards", k:"S1–S18", d:"One spec, three layers — Functional (what & why), UX (how it works: IA, flows, structure), UI (how it looks). Written bottom-up, UX before UI, each absent layer marked N/A."},
    {t:"Testing Strategy", k:"D0–D7 · A1–A6", d:"What to test and what counts as proof — a trigger table tying code shapes to required test directives, plus the Proof Pack contract (oracle, red-observed, confidence, residual risk)."},
    {t:"Observability & Instrumentation", k:"O1–O13", d:"How code emits telemetry in the OpenTelemetry data model — structured, trace-correlated, with stable error codes and RFC 9457 problem details. Load-bearing telemetry is tested."},
    {t:"Knowledge Visualization", k:"V1–V18", d:"The knowledge graph and Docs Explorer — atomic linked artifacts, frontmatter as the record, typed edges, three projections (hierarchy / graph / mind map), review-by SLAs, and the docs-graph.py tool bundle."},
    {t:"Layered-Optimized Architecture", k:"T0–T4 · P1–P11", d:"Designing AI-integrated systems where per-call inference cost spans 3–5 orders of magnitude. Tier allocation is an architectural dimension; determinism at the floor; cheapest sufficient tier."},
    {t:"UI & Interaction Design", k:"U1–U20", d:"How interfaces are excellent — token systems, complete component states (incl. loading/empty/error), real motion & copy, the AI-UX layer (HAX + Shape-of-AI), WCAG 2.2 AA, and performance budgets."},
    {t:"UI Archetype Grammar", k:"G1–G16", d:"A formal grammar that pins the kind of interface as a determinism control before code is generated — routing, temporal behavior, data posture, surface flavor. Composes with U1–U20."},
    {t:"UI Archetype Catalog", k:"A1–F2", d:"The filled-out companion to the grammar: every archetype with real exemplars, a canonical Archetype Signature, and a model-agnostic codegen descriptor."},
    {t:"Collaborative Personas", k:"peer + adversary", d:"The dual-mode council — every lens worn two ways: as a co-author in Peer Mode and as a critic in Adversary Mode, with the veto and conflict-resolution operating standard."},
    {t:"Persona Catalog & Cards", k:"23 roster", d:"The roster itself — each persona's mandate, its convene-when trigger, its interrogation set, and its veto class (hard / soft / advisory)."},
    {t:"Engineering Governance", k:"SDLC lenses", d:"The non-functional, operational, and governance lenses pulled in proportionally at specify time — quality attributes, threat modeling, privacy, accessibility, release/rollback, supply chain."},
    {t:"C# Style Guide", k:".NET 10 / C# 14", d:"How C# is written — legible, intentional, durable: self-documenting names, expressive types, concurrency, security, and observability aligned with OpenTelemetry."},
    {t:"Foundation Manifest", k:"vendoring", d:"The vendor manifest that freezes the base-pack documents into this bundle with drift detection, so intentional divergences are visible and re-vendoring is flagged."}
  ];

  // The 23-person roster — collaborative-personas.md / persona-cards.md
  const PERSONAS = [

  function Stat({n,l}){ return html`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`; }

        <h1>The reasoning constitution,<br/>made walkable.</h1>
        <p class="lead">The AI-Forward Pack turns an adversarial reviewer council into a working swarm:
          collaborating <b>peers</b> that author, adversarial <b>personas</b> that attack, and a staged
          reasoning discipline — the <b>Rigor Protocol</b> — that replaces the rush to a plausible answer

        <div class="stat-row">${STATS.map((s,k)=>html`<${Stat} key=${k} n=${s[0]} l=${s[1]}/>`)}</div>

        <div class="sechead"><div class="seclabel">The stack</div>
          <h2>How the pieces fit together</h2>
          <p>Each layer rests on the one below it. The <b>Body of Knowledge</b> is the constitution; everything
          else operationalizes it. Skills run the Rigor Protocol; the protocol convenes the personas; the
          personas judge against the standards; the work becomes discoverable artifacts in the knowledge graph.</p></div>
        <div class="grid g3">
          <div class="card"><h3>① Reason</h3><p>Body of Knowledge (D1–D3) → the Rigor Protocol (stages 0–5) → Rules of the Road (phases 1–8, tiers T0–T2, gates). How to think, in order.</p></div>
          <div class="card"><h3>② Establish & prove</h3><p>Spike Protocol (read + run) at evidence time → Testing Strategy (the proof bar) → Observability (telemetry as a tested contract). Claims earn their confidence label.</p></div>
          <div class="card"><h3>③ Judge</h3><p>The 23-persona council in two modes — author in Peer Mode, attack in Adversary Mode — with hard / soft / advisory vetoes and a deterministic conflict rule.</p></div>
          <div class="card"><h3>④ Architect</h3><p>Layered-Optimized Architecture (tiers T0–T4, principles P1–P11) places cognition by inference cost. Specification Standards (S1–S18) shape the spec in three layers.</p></div>

      <!-- UI GRAMMAR -->
      <section class="block" id="grammar"><div class="wrap">
        <div class="sechead"><div class="seclabel">Determinism control</div>
          <h2>The UI template approach &amp; its grammar</h2>
          <p>Determinism in generated UI comes from <b>constraining the search space before generation, not
          correcting after.</b> Asked for "a dashboard," a model picks from a vast space and regresses to the
          mean. Given an <b>Archetype Signature</b> — a fixed-arity fingerprint naming the routing model,
          temporal behavior, data posture, and surface flavor — plus named exemplars and explicit codegen
          rules, the same model produces a tightly bounded, predictable result.</p></div>
        <div class="grid g2" style=${{marginBottom:20}}>
          <div class="card"><h3>G1 · Two layers, always both</h3><p>A UI template is an <b>Archetype Signature</b> (the selector) <i>composed with</i> a concrete spec (U1–U20 tokens, complete states, real copy, flows; S1–S18 layers). The signature is the constraint; the spec is the content. A signature alone is never a sufficient UI spec.</p></div>
          <div class="card"><h3>G2 · A selector, not the design</h3><p>The signature names <i>which</i> archetype and how it behaves in time and data — it carries no hex, spacing scale, or breakpoints. Those live in tokens. The one bridge to specifics is bounded <code>StyleHints</code>, applied last as decoration.</p></div>
          <div class="card"><h3>G7 · Facets become code</h3><p>Each facet resolves to an instruction: <code>Pacing:LockedUntilValid</code> → disable Next until validation passes; <code>Sync:Optimistic</code> → mutate locally, reconcile, roll back; <code>Feedback:Choreographed</code> → narrate the wait instead of a spinner.</p></div>
          <div class="card"><h3>G8 · Conflicts are checkable</h3><p>A syntactically valid signature can still be incoherent: <code>StrictFunnel</code> with <code>Pacing:Freeform</code>, or <code>Motion:None</code> with <code>Transition:Morph</code>, are rejected or flagged with rationale. <code>A11y</code> is a floor, not a flavor — always at least <code>WCAG_2.2_AA</code>.</p></div>
        </div>
        <h3 style=${{marginBottom:8}}>The signature, by facet group</h3>
        <p class="muted" style=${{fontSize:14,marginBottom:6}}>Four required facets (<code>Type</code>, <code>Arch</code>, <code>Layout</code>, <code>Pacing</code>) most determine generated structure; the rest default sensibly when omitted.</p>
        ${sig([["Type","product family"],["Arch","routing + time"],["Layout","skeleton"],["Density","info density"],["Nav","mechanisms"],["Viewport","hardware"],["Input","modalities"],["Color","strategy"],["Depth","material"],["Sync","client↔server"],["Persistence","survives refresh"],["Feedback","response"],["Motion","animation"],["Pacing","who advances"],["Transition","state change"],["A11y","floor"]])}
        <details class="note"><summary>The grammar in EBNF (excerpt)</summary>
          <pre class="ebnf">Signature   ::= Name "{" FacetList "}" StyleHints?
Facet       ::= Category | Architecture | Layout | Density | Nav
              | Viewport | Input | Color | Typography | Depth
              | Sync | Persistence | Feedback | Motion | Pacing
              | Transition | A11y | Custom

Architecture ::= "Arch" ":" ( "SPA" | "MPA" | "InfiniteScroll"
              | "Streaming" | "SpatialUnbounded" | "HubAndSpoke"
              | "StateMachine" | "StrictFunnel" | "Branching" | "Islands" )
Pacing       ::= "Pacing" ":" ( "Freeform" | "UserDriven"
              | "SystemDriven" | "LockedUntilValid" )
A11y         ::= "A11y" ":" A11yV ("+" A11yV)*   (* a SET — co-apply *)</pre>
          <p class="muted" style=${{fontSize:13,margin:0}}>Multi-valued facets (<code>Nav</code>, <code>Input</code>, <code>Feedback</code>, <code>Motion</code>, <code>A11y</code>) are sets joined with <code>+</code>; the rest take one value. An <code>x-</code> hook escapes closed enums for novel cases.</p></details>
      </div></section>

      <!-- CATALOG TABLE -->
      <section class="block" id="catalog"><div class="wrap">
        <div class="sechead"><div class="seclabel">The template types</div>
          <h2>Archetype catalog — pick a row to start</h2>
          <p>Sixteen archetypes, each with real exemplars to anchor to and a canonical signature to copy and
          adjust. Resolve the archetype from <code>Type</code>+<code>Arch</code>+<code>Layout</code>, apply the
          codegen descriptor, then compose the concrete spec. Click <b>view ▸</b> to jump to the rendered mockup.</p></div>
        <div style=${{overflowX:"auto"}}><table class="tbl">
          <thead><tr><th>ID</th><th>Archetype</th><th>Category</th><th>Defining facets</th><th>Exemplars</th><th>Preview</th></tr></thead>
          <tbody>${ARCH.map((a,k)=>html`<tr key=${k}>
            <td class="mono" style=${{color:"var(--accent-2)",fontWeight:700}}>${a.id}</td>
            <td><b>${a.name}</b></td>
            <td class="muted" style=${{whiteSpace:"nowrap"}}>${a.cat}</td>
            <td><code>${a.facets.slice(0,3).map(f=>f[0]+":"+f[1]).join(" · ")}</code></td>
            <td class="muted">${a.ex.map(e=>e[0]).join(", ")}</td>
            <td><a href=${"#mockup-"+a.id}>view ▸</a></td></tr>`)}</tbody>
        </table></div>
      </div></section>

      <!-- MOCKUPS -->
      <section class="block" id="mockups"><div class="wrap">
        <div class="sechead"><div class="seclabel">See, then choose</div>
          <h2>Linkable archetype mockups</h2>
          <p>A visual representation of each template type — a styled approximation of how the archetype
          actually behaves, not a screenshot. Every card is deep-linkable (<code>#mockup-A1</code>…), so you
          can share a specific one. Use them to feel the difference before committing a signature.</p></div>
        <div class="mock-grid">
          ${ARCH.map((a,k)=>html`<div class="mock-card" id=${"mockup-"+a.id} key=${k}>
            <div class="mock-head">
              <span class="id">${a.id}</span><h3>${a.name}</h3>
              <span class="cat">${a.cat}</span>
              <a class="anchor" href=${"#mockup-"+a.id} title="Permalink to this mockup">¶</a>
            </div>
            <div class="mock-desc">${a.desc}</div>
            <div class="device">${bar()}${MOCK[a.id]?MOCK[a.id]():html`<div class="vp"></div>`}</div>
            <div class="mock-sig"><code>${a.facets.map((f,j)=>html`<${React.Fragment} key=${j}><b>${f[0]}</b>:${f[1]}${j<a.facets.length-1?" · ":""}</${React.Fragment}>`)}</code></div>
            <div class="exemplars">Exemplars: ${a.ex.map((e,j)=>html`<${React.Fragment} key=${j}><a href=${e[1]} target="_blank" rel="noopener">${e[0]}</a>${j<a.ex.length-1?" · ":""}</${React.Fragment}>`)}</div>
          </div>`)}
        </div>
      </div></section>

      <footer><div class="wrap">
        <p><b>AI-Forward Pack</b> — interactive explainer. Self-contained (React 18 UMD + htm, content embedded).
        Generated by <code>/document</code>; true to the pack source under <code>.claude/knowledge/</code> and
        <code>.claude/skills/</code> as of the documented commit. The downloadable pack lives in
        <code>web/ai-forward-pack-overview.jsx</code>; the full knowledge graph is browsable at <code>docs/index.html</code>.</p>
        <p class="faint">Archetype exemplars link to live products and were correct at authoring — verify on use.
        Confidence: structure &amp; signatures <span class="conf v">Verified</span> against the catalog; mockups are
        illustrative <span class="conf i">Inferred</span> renderings of each archetype's described behavior.</p>
      </div></footer>
    </${React.Fragment}>`;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);

  // theme toggle
  const apply=(t)=>{ document.documentElement.setAttribute("data-theme",t);
    try{localStorage.setItem("afp-theme",t);}catch(e){} };
  let theme = (function(){ try{return localStorage.getItem("afp-theme");}catch(e){return null;} })()
    || (matchMedia && matchMedia("(prefers-color-scheme: light)").matches ? "light":"dark");
  apply(theme);
  document.addEventListener("click",function(e){
    if(e.target && e.target.id==="themebtn"){ theme = theme==="dark"?"light":"dark"; apply(theme); }
  });
});
</script>
