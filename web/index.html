<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-Forward Pack</title>
<!--
  The pack's front door: two tabs.
    1. Explainer — the narrative (embedded from ai-forward-pack-explainer.html, the real file, no copy).
    2. Index — the whole-pack navigable + searchable index, from web/pack-index.js
       (regenerated by tools/build-web-index.py, wired into sync-pack.ps1).
  Self-contained, vanilla JS, works over file://.
-->
<script src="pack-index.js"></script>
<style>
  :root{
    --bg:#0f1115; --panel:#161922; --ink:#e8eaf0; --muted:#9aa3b2; --line:#262b36;
    --accent:#6ea8fe; --chip:#1d2230; --mark:#3a4a2a;
    --c-knowledge:#7ad0a6; --c-skills:#6ea8fe; --c-templates:#e8d26e; --c-scripts:#9aa3b2;
    --c-personas:#c79bf2; --c-examples:#5ec5d4; --c-graph:#f2a65a; --c-guides:#d4a5c9;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#fff; --panel:#f6f7f9; --ink:#1b1f27; --muted:#5b6573; --line:#e6e8ec;
           --accent:#2563eb; --chip:#eef1f6; --mark:#fff3b0; }
  }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;
       font:14px/1.55 ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  header{flex:0 0 auto;background:var(--bg);border-bottom:1px solid var(--line);
         padding:10px 20px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;white-space:nowrap}
  .tabs{display:flex;gap:6px}
  .tabs button{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:7px 16px;border-radius:999px;cursor:pointer;font-size:13.5px;font-weight:600}
  .tabs button:hover{border-color:var(--accent)}
  .tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .hlinks{margin-left:auto;display:flex;gap:14px;font-size:13px;white-space:nowrap}
  .view{flex:1 1 auto;min-height:0;display:none}
  #view-explainer.active{display:block}
  #view-index.active{display:flex;flex-direction:column}
  iframe{width:100%;height:100%;border:0;display:block;background:var(--bg)}
  .toolbar{flex:0 0 auto;display:flex;gap:14px;align-items:center;padding:12px 20px;border-bottom:1px solid var(--line)}
  #q{flex:1;min-width:220px;background:var(--panel);border:1px solid var(--line);color:var(--ink);
     border-radius:9px;padding:9px 12px;font-size:14px}
  #q:focus{outline:2px solid var(--accent);outline-offset:0}
  .count{color:var(--muted);font-size:13px;white-space:nowrap}
  .layout{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:230px 1fr}
  nav{border-right:1px solid var(--line);padding:14px 10px;background:var(--panel);overflow:auto}
  nav button{display:flex;justify-content:space-between;gap:8px;width:100%;text-align:left;
    background:none;border:0;color:var(--ink);padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13.5px}
  nav button:hover{background:var(--chip)} nav button.active{background:var(--accent);color:#fff}
  nav button .n{color:var(--muted)} nav button.active .n{color:#fff}
  main{padding:14px 20px 60px;overflow:auto}
  .group h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .item{padding:9px 10px;border-radius:9px;border:1px solid transparent}
  .item:hover{background:var(--panel);border-color:var(--line)}
  .item .t{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
  .item .t a{font-weight:600;font-size:14.5px}
  .badge{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding:1px 7px;border-radius:999px;
    background:var(--chip);color:var(--muted);border:1px solid var(--line)}
  .item .s{color:var(--muted);margin:2px 0 1px;font-size:13px}
  .item .p{color:var(--muted);font-size:11.5px;opacity:.8;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  mark{background:var(--mark);color:inherit;border-radius:3px;padding:0 1px}
  .empty{color:var(--muted);padding:40px 10px;text-align:center}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:2px}
</style>
</head>
<body>
<header>
  <h1>AI-Forward Pack</h1>
  <div class="tabs">
    <button id="tab-explainer" class="active" data-view="explainer">Explainer</button>
    <button id="tab-index" data-view="index">Index &amp; search</button>
  </div>
  <span class="hlinks">
    <a href="../docs/index.html">Docs Explorer ↗</a>
    <a href="../docs/audit/index.html">Audit log ↗</a>
    <a href="ai-forward-pack-explainer.html" target="_blank" rel="noopener">Open explainer ↗</a>
  </span>
</header>

<section id="view-explainer" class="view active">
  <iframe title="AI-Forward Pack — interactive explainer" src="ai-forward-pack-explainer.html"></iframe>
</section>

<section id="view-index" class="view">
  <div class="toolbar">
    <input id="q" type="search" placeholder="Search the whole pack — knowledge, skills, templates, scripts, personas, examples, graph…  (press /)">
    <span class="count" id="count"></span>
  </div>
  <div class="layout">
    <nav id="nav"></nav>
    <main id="main"></main>
  </div>
</section>

<script>
(function(){
  var IDX = window.PACK_INDEX || {categories:[],items:[],total:0};
  var CATLABEL = {}, CATCOLOR = {
    knowledge:'--c-knowledge', skills:'--c-skills', templates:'--c-templates', scripts:'--c-scripts',
    personas:'--c-personas', examples:'--c-examples', graph:'--c-graph', guides:'--c-guides'
  };
  IDX.categories.forEach(function(c){ CATLABEL[c.id]=c.label; });
  IDX.items.forEach(function(it){ it._h = (it.text+' '+it.title+' '+(it.summary||'')+' '+it.path).toLowerCase(); });

  var state = { q:'', cat:'all' };
  var qEl = document.getElementById('q'), nav = document.getElementById('nav'),
      main = document.getElementById('main'), countEl = document.getElementById('count');

  /* ---- tab switching ---- */
  var rendered = false;
  function showView(name){
    document.getElementById('tab-explainer').classList.toggle('active', name==='explainer');
    document.getElementById('tab-index').classList.toggle('active', name==='index');
    document.getElementById('view-explainer').classList.toggle('active', name==='explainer');
    document.getElementById('view-index').classList.toggle('active', name==='index');
    if(name==='index'){ if(!rendered){ render(); rendered=true; } setTimeout(function(){ qEl.focus(); }, 0); }
  }
  document.getElementById('tab-explainer').onclick=function(){ showView('explainer'); };
  document.getElementById('tab-index').onclick=function(){ showView('index'); };

  /* ---- index + search ---- */
  function href(p){ return p.indexOf('web/')===0 ? p.slice(4) : '../'+p; }
  function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function terms(){ return state.q.toLowerCase().split(/\s+/).filter(Boolean); }
  function matches(it){
    if(state.cat!=='all' && it.cat!==state.cat) return false;
    var ts=terms(); for(var i=0;i<ts.length;i++){ if(it._h.indexOf(ts[i])===-1) return false; } return true;
  }
  function hl(s){
    var ts=terms(); s=esc(s); if(!ts.length) return s;
    ts.forEach(function(t){ if(!t) return;
      var re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
      s=s.replace(re,'<mark>$1</mark>'); });
    return s;
  }
  function color(cat){ return getComputedStyle(document.documentElement).getPropertyValue(CATCOLOR[cat]||'--muted'); }
  function countFor(cat){
    var ts=terms();
    return IDX.items.filter(function(it){
      if(cat!=='all' && it.cat!==cat) return false;
      for(var i=0;i<ts.length;i++){ if(it._h.indexOf(ts[i])===-1) return false; } return true;
    }).length;
  }
  function renderNav(){
    var html = '<button data-cat="all" class="'+(state.cat==='all'?'active':'')+'">'
             + '<span>All</span><span class="n">'+countFor('all')+'</span></button>';
    IDX.categories.forEach(function(c){
      html += '<button data-cat="'+c.id+'" class="'+(state.cat===c.id?'active':'')+'">'
            + '<span><span class="dot" style="background:'+color(c.id)+'"></span>'+esc(c.label)+'</span>'
            + '<span class="n">'+countFor(c.id)+'</span></button>';
    });
    nav.innerHTML = html;
    [].forEach.call(nav.querySelectorAll('button'), function(b){
      b.onclick=function(){ state.cat=b.getAttribute('data-cat'); render(); };
    });
  }
  function render(){
    renderNav();
    var list = IDX.items.filter(matches);
    countEl.textContent = list.length + ' / ' + IDX.total + ' items';
    if(!list.length){ main.innerHTML='<div class="empty">No matches. Try fewer or different terms.</div>'; return; }
    var order = IDX.categories.map(function(c){return c.id;});
    var html='';
    order.forEach(function(cat){
      var g = list.filter(function(it){ return it.cat===cat; });
      if(!g.length) return;
      html += '<div class="group"><h2>'+esc(CATLABEL[cat]||cat)+' · '+g.length+'</h2>';
      g.forEach(function(it){
        html += '<div class="item"><div class="t">'
              + '<a href="'+esc(href(it.path))+'" target="_blank" rel="noopener">'+hl(it.title)+'</a>'
              + '<span class="badge" style="border-color:'+color(it.cat)+'">'+esc(it.kind)+'</span></div>'
              + (it.summary?'<div class="s">'+hl(it.summary)+'</div>':'')
              + '<div class="p">'+esc(it.path)+'</div></div>';
      });
      html += '</div>';
    });
    main.innerHTML = html;
  }

  qEl.addEventListener('input', function(){ state.q=qEl.value; render(); });
  document.addEventListener('keydown', function(e){
    if(e.key==='/' && document.activeElement!==qEl){ e.preventDefault(); showView('index'); }
    else if(e.key==='Escape' && document.activeElement===qEl){ qEl.value=''; state.q=''; render(); }
  });
})();
</script>
</body>
</html>
